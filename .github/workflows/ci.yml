name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate all standards YAML files
        run: |
          python3 << 'EOF'
          import yaml, glob, sys, os

          errors = []

          # Validate index.yaml
          try:
              data = yaml.safe_load(open('index.yaml'))
              assert 'version' in data, "index.yaml missing version"
              assert 'files' in data, "index.yaml missing files"
              print(f"✅ index.yaml")
          except Exception as e:
              errors.append(f"❌ index.yaml: {e}")

          # Validate ecosystem.yaml
          try:
              eco_data = yaml.safe_load(open('ecosystem.yaml'))
              assert 'services' in eco_data, "ecosystem.yaml missing services"
              for svc in eco_data.get('services', []):
                  for exc in svc.get('check_exceptions', []):
                      assert isinstance(exc, dict), f"{svc['id']} check_exception is not an object: {exc}"
                      assert 'rule' in exc, f"{svc['id']} check_exception missing 'rule': {exc}"
                      assert 'reason' in exc, f"{svc['id']} check_exception missing 'reason': {exc}"
              print(f"✅ ecosystem.yaml")
          except Exception as e:
              errors.append(f"❌ ecosystem.yaml: {e}")

          # Validate definitions-of-done.yaml
          try:
              data = yaml.safe_load(open('definitions-of-done.yaml'))
              assert 'definitions_of_done' in data, "definitions-of-done.yaml missing definitions_of_done"
              print(f"✅ definitions-of-done.yaml")
          except Exception as e:
              errors.append(f"❌ definitions-of-done.yaml: {e}")

          # Validate each standards file
          all_ids = []
          all_rules = []
          for f in sorted(glob.glob('standards/*.yaml')):
              try:
                  data = yaml.safe_load(open(f))
                  assert 'standards' in data, f"{f} missing 'standards' key"
                  rules = data['standards']
                  for r in rules:
                      assert 'id' in r, f"Rule missing id in {f}"
                      assert 'title' in r, f"Rule {r.get('id')} missing title"
                      assert 'status' in r, f"Rule {r.get('id')} missing status"
                      assert 'severity' in r, f"Rule {r.get('id')} missing severity"
                      assert 'dimension' in r, f"Rule {r.get('id')} missing dimension"
                      assert 'applies_to' in r, f"Rule {r.get('id')} missing applies_to"
                      all_ids.append(r['id'])
                      all_rules.append(r)
                  print(f"✅ {f}: {len(rules)} rules")
              except Exception as e:
                  errors.append(f"❌ {f}: {e}")

          # Check for duplicate IDs
          dupes = [id for id in all_ids if all_ids.count(id) > 1]
          if dupes:
              errors.append(f"❌ Duplicate rule IDs found: {list(set(dupes))}")

          # Check checkable: true rules have check_notes
          for r in all_rules:
              if r.get('checkable') is True and not r.get('check_notes'):
                  errors.append(
                      f"❌ {r['id']}: checkable: true but missing check_notes"
                  )

          valid_dod_types = {'new_cog','new_fastapi_service','new_hono_service',
                             'new_frontend_site','new_react_app','new_pipeline',
                             'library','all'}
          for r in all_rules:
              applies = r.get('applies_to', [])
              for a in applies:
                  assert a in valid_dod_types, f"{r['id']} applies_to has invalid value: {a}"

          valid_dod = valid_dod_types | {None}
          for svc in eco_data.get('services', []):
              if svc.get('status') == 'active':
                  assert 'dod_type' in svc, f"{svc['id']} missing dod_type"
                  assert svc['dod_type'] in valid_dod, f"{svc['id']} invalid dod_type: {svc['dod_type']}"

          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)

          print(f"\n✅ All valid — {len(all_ids)} rules, 0 duplicates")
          EOF

  release:
    name: Release
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install semantic-release plugins
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/exec \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
