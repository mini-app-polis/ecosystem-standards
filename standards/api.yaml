# ecosystem-standards / api.yaml
# Standards for all API services — FastAPI (Python) and Hono (TypeScript).

standards:

  # ─────────────────────────────────────────────
  # STACK
  # ─────────────────────────────────────────────

  - id: API-001
    title: All new API services on Railway
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [api-service]
    description: >
      All new API services deployed on Railway regardless of language.
      Python services use FastAPI. TypeScript services use Hono on Node.
      Railway is the single hosting standard. Cloudflare Workers deprecated
      for new API work.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Verify the repo targets Railway as its deploy host:
        (1) A Railway config file exists at repo root: one of
            `nixpacks.toml`, `railway.toml`, or `Procfile`. Flag if none
            are present.
        (2) The matching service entry in ecosystem.yaml has
            `host: railway`. Flag if `host` is any other value
            (cloudflare-workers, vercel, etc.) on an active service.
        (3) Verify the expected framework is present in dependency
            declarations:
              - Python (language: python in ecosystem.yaml):
                `fastapi` appears in pyproject.toml [project.dependencies].
              - TypeScript (language: typescript):
                `hono` appears in package.json dependencies.
            Flag services whose declared language does not match the
            required framework, or whose framework is absent entirely.

  - id: API-002
    title: PostgreSQL as data store for new services
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [api-service]
    description: >
      All new services that require persistence use PostgreSQL deployed
      on Railway. Not D1, SQLite, or MySQL.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Scan dependency declarations for database drivers:
        (1) Required if any DB-driver dependency is present at all — if
            the service has no DB deps, skip this check (service may be
            stateless by design).
        (2) Allowed drivers:
              - Python: `psycopg`, `psycopg2`, `psycopg[binary]`,
                `asyncpg`, or `sqlalchemy` (which permits postgres).
              - TypeScript: `pg`, `postgres`, `drizzle-orm` (paired with
                `postgres-js` or `pg`), or `@prisma/client` (with a
                postgres provider configured).
        (3) Disallowed drivers (flag as violation):
              - `better-sqlite3`, `sqlite3`, `@cloudflare/d1`, `d1-orm`,
                `mysql`, `mysql2`.
        (4) If a postgres driver AND a disallowed driver are both present,
            flag both — the disallowed one must be removed.

  - id: API-003
    title: ORM required — SQLAlchemy (Python) or Drizzle (TypeScript)
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [api-service]
    description: >
      Python: SQLAlchemy async with asyncpg driver, Pydantic-compatible models,
      Alembic for migrations. TypeScript: Drizzle ORM with postgres.js driver,
      TypeScript-native schema definitions, Drizzle Kit for migrations.
      No raw SQL without ORM.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Python services (language: python in ecosystem.yaml):
        (1) `sqlalchemy` appears in pyproject.toml [project.dependencies].
            Flag if absent on an api-service with a postgres driver (see
            API-002).
        (2) At least one class in src/**/*.py inherits from `Base`,
            `DeclarativeBase`, or declares `__tablename__` (SQLAlchemy
            model). Flag if no such class is found on a service with a
            postgres driver.
        (3) Flag any occurrence in src/**/*.py of a raw SQL string passed
            directly to a DB execution call. Specifically:
              - `session.execute("...")` or `connection.execute("...")`
                where the argument is a bare string literal (not
                `sqlalchemy.text(...)` wrapped).
              - `text("SELECT ...")`, `text("INSERT ...")`, `text("UPDATE ...")`,
                or `text("DELETE ...")` — using `text()` is permitted for
                advanced queries only when accompanied by a comment
                explaining why ORM constructs are insufficient.
              - Direct `asyncpg.connect()` usage followed by `.execute()`
                or `.fetch()` with inline SQL.
            Exempt: migration scripts under `alembic/versions/**/*.py`
            and test fixtures under `tests/**/*.py`.
      TypeScript/Hono services (language: typescript):
        (1) `drizzle-orm` appears in package.json `dependencies`. Flag if
            absent on an api-service with a postgres driver.
        (2) A `drizzle.config.ts` or `drizzle.config.js` file exists at
            repo root. Flag if absent.
        (3) Flag any occurrence in src/**/*.ts of `sql\`...\`` tagged
            template literals containing `SELECT`, `INSERT`, `UPDATE`, or
            `DELETE` outside of `drizzle-orm`'s `db.execute(sql\`...\`)`
            pattern. Exempt: migration files under `drizzle/` directory.

  # ─────────────────────────────────────────────
  # STRUCTURE
  # ─────────────────────────────────────────────

  - id: API-004
    title: "Versioned routes — /v1/<resource>"
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [api-service]
    description: >
      All routes versioned from day one: /v1/<resource>. No unversioned routes
      in production.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Python/FastAPI: check route decorators (@app.get, @router.get, etc.)
      for /v1/ prefix. Resolve the effective mounted path per-route by
      composing: (1) any prefix passed to APIRouter(prefix=...) at router
      construction, (2) any prefix passed to app.include_router(router,
      prefix=...) when the router is mounted. A decorator like
      @router.get("/summary") on a router declared with
      APIRouter(prefix="/v1/evaluations") has effective path
      /v1/evaluations/summary and should pass.
      TypeScript/Hono: check route handler registrations (app.get, app.post,
      router.get, etc.) for /v1/ path prefix. Flag routes without it.
      Exempt from versioning: /health, /metrics, /docs, /openapi.json,
      /redoc, and /version. The /version endpoint is the single legitimate
      carve-out because it reports the API version — it must be reachable
      at a stable, version-independent path to be useful.

  - id: API-005
    title: Response envelope on all endpoints
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [api-service]
    description: >
      All responses wrapped: { data: ..., meta: { count, version } }.
      Errors: { error: { code, message } }. No bare arrays or inconsistent shapes.
      API-005 is the presence-of-envelope check. XSTACK-002 is the
      cross-stack parity check (shape identical across Python and TypeScript).
      API-005 fails when an endpoint returns nothing envelope-shaped at all;
      XSTACK-002 fails when the envelope exists but diverges from the
      canonical shape.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Python/FastAPI services:
        (1) Every route decorator (@app.get, @app.post, @router.get,
            @router.post, @router.put, @router.patch, @router.delete,
            including sub-routers) in src/**/*.py must declare
            `response_model=` as a keyword argument. Flag any decorator
            missing it.
        (2) The value passed to `response_model=` must resolve to a
            Pydantic model. Flag `response_model=dict`,
            `response_model=list`, `response_model=List[...]`,
            `response_model=Dict[...]`, or any bare container type.
        (3) Exempt: routes with `response_class=StreamingResponse`,
            `FileResponse`, `HTMLResponse`, or `Response` (raw HTTP
            responses by design), and routes under /health, /metrics,
            /docs, /openapi.json, /redoc, /version.
      TypeScript/Hono services:
        (1) Every route handler registered via `app.get`, `app.post`,
            `app.put`, `app.patch`, `app.delete`, `router.get` (etc.) in
            src/**/*.ts must return either:
              - a call to `success(...)` or `error(...)` from
                `common-typescript-utils`, OR
              - a literal object with top-level keys exactly matching
                either `{ data, meta }` or `{ error }`.
            Flag any handler returning `c.json(someArray)`,
            `c.json({ items: [...] })`, or any other shape that does not
            match the two permitted literals.
        (2) Exempt: /health, /metrics, and raw `c.text(...)` /
            `c.html(...)` responses.

  - id: API-006
    title: Tables authorization-scoped to a Clerk user
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [api-service]
    description: >
      Every data-bearing table is authorization-scoped to a Clerk user, so
      queries can filter by the authenticated identity. Three patterns
      satisfy this: (1) direct ownership via an owner_id column holding the
      Clerk user ID; (2) identity tables whose primary key is the user_id
      itself; (3) relationship tables whose user_id column carries a
      ForeignKey to an identity table.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Search Python source files for SQLAlchemy model class definitions
      (subclasses of Base or DeclarativeBase). For each model, verify at
      least one of the three authorization-scoping patterns is present:
      (1) an owner_id column (direct ownership);
      (2) a user_id column declared as primary_key=True, or the class
      name ends in Profile/Identity/User (identity table);
      (3) a user_id column whose mapped_column(...) / Column(...) call
      contains a ForeignKey(...) argument (relationship table).
      Flag models that satisfy none of the three. Exempt join, lookup,
      and internal-only tables by class-name suffix (_lookup, _config,
      _enum, or the PascalCase equivalents). The SQLAlchemy declarative
      root class (Base, DeclarativeBase, Model) is skipped automatically
      since it holds no columns of its own.

  - id: API-007
    title: Clerk for authentication
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [api-service]
    description: >
      Authentication via Clerk across all services. Consistent across the ecosystem.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Python services: search source files for clerk or verify_token imports.
      Check for a Depends(verify_token) pattern on protected route definitions.
      TypeScript services: check package.json for @clerk/clerk-sdk-node or
      equivalent. Search for verifyClerkToken from common-typescript-utils on
      protected routes. Flag if no Clerk dependency is found and the service
      has non-public endpoints.

  - id: API-008
    title: Public endpoints explicit and intentional
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [api-service]
    description: >
      Public (unauthenticated) endpoints are explicitly documented and intentional —
      not accidental.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Identify all FastAPI route definitions (Python) or Hono route handlers
      (TypeScript) that have no auth dependency. Exempt standard
      infrastructure endpoints: /health, /metrics, /docs, /openapi.json,
      /redoc. These are platform-provided and never require auth by design.
      All other unauthenticated routes, including /version and any
      application-level endpoints like /contact or /, are flagged —
      whether the lack of auth is intentional is the policy decision to
      make, not a carve-out. Remediate either by adding auth or by
      documenting the intent via DOC-011. LLM: for each unauthed route
      found, assess whether it is plausibly intentional (e.g. public read
      endpoint, contact form) or potentially accidental (e.g. write
      endpoint, user-specific data endpoint with no auth).

  - id: API-009
    title: CORS configured via env var — never hardcoded
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [api-service]
    description: >
      All API services configure CORS origins via a CORS_ORIGINS environment
      variable. Never hardcode allowed origins in source code. The env var
      holds a comma-separated list of allowed origins. Applies to both FastAPI
      (Python) and Hono (TypeScript) services. CORS_ORIGINS must be present
      in .env.example with a documented default.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Python/FastAPI: check for CORSMiddleware in app setup and CORS_ORIGINS
      env var usage — flag hardcoded origin strings.
      TypeScript/Hono: check for cors() middleware import and usage in app
      setup, with allowed origins sourced from process.env.CORS_ORIGINS.
      Flag if CORS_ORIGINS is hardcoded or CORS middleware is absent entirely.
      Check .env.example for CORS_ORIGINS entry.

  - id: API-010
    title: /health endpoint on all API services
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [api-service]
    description: >
      All Railway-hosted API services expose a GET /health endpoint returning
      {"status": "ok"} with HTTP 200. No authentication required. Used by
      Railway for health checks and as the liveness layer of the three-layer
      observability stack (CD-010). The endpoint must respond even if
      downstream dependencies (database, external APIs) are unavailable —
      it signals process liveness only, not dependency health.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Search route handler files for a GET /health route definition.
      The route must: return HTTP 200, return a JSON body with at minimum
      a 'status' field, require no authentication, and perform no database
      queries or external calls. Flag if absent or if the route performs
      DB queries (health endpoint must not depend on DB liveness).

  - id: API-011
    title: Database migrations run via CI — never manually
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [api-service]
    description: >
      Alembic (Python) and Drizzle Kit (TypeScript) migrations are applied
      as a CI/CD step before the new service version is live. Never run
      migrations manually against a Railway database. Manual migration against
      production bypasses the audit trail, risks applying the wrong version,
      and cannot be rolled back cleanly. The migration step in CI runs after
      tests pass and before the Railway deploy completes.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Python/FastAPI (Alembic): check ci.yml for 'alembic upgrade head' step
      in the deploy job. Flag if absent or if migration is run manually.
      TypeScript/Hono (Drizzle): check ci.yml for 'drizzle-kit push' or
      'drizzle-kit migrate' step. Flag if absent.
      For monorepo services, check the workspace root ci.yml — the migration
      step may be at root level rather than per-app. Do not flag if found
      at the monorepo root CI.

# AUTH-* rules moved to standards/auth.yaml.

