# ecosystem-standards / api.yaml
# Standards for all API services — FastAPI (Python) and Hono (TypeScript).
# Version: 1.0.0 · 2026-03

standards:

  # ─────────────────────────────────────────────
  # STACK
  # ─────────────────────────────────────────────

  - id: API-001
    title: All new API services on Railway
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      All new API services deployed on Railway regardless of language. Python
      services use FastAPI. TypeScript services use Hono on Node. Railway is the
      single hosting standard. Cloudflare Workers deprecated for new API work.
    checkable: false
    added: 2026-03

  - id: API-002
    title: PostgreSQL as data store for new services
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      All new services use PostgreSQL deployed on Railway. Not D1 or SQLite.
    checkable: false
    added: 2026-03

  - id: API-003
    title: ORM required — SQLAlchemy (Python) or Drizzle (TypeScript)
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      Python: SQLAlchemy async with asyncpg driver, Pydantic-compatible models,
      Alembic for migrations. TypeScript: Drizzle ORM with postgres.js driver,
      TypeScript-native schema definitions, Drizzle Kit for migrations.
      No raw SQL without ORM.
    checkable: true
    check_notes: >
      Python services: check pyproject.toml for sqlalchemy dependency and
      src/ for SQLAlchemy model definitions. Flag if raw SQL strings are
      used outside of ORM context.
      TypeScript/Hono services: check package.json for drizzle-orm dependency
      and src/ for drizzle-kit config (drizzle.config.ts). Flag if neither
      is present for a service that interacts with PostgreSQL.
    added: 2026-03

  # ─────────────────────────────────────────────
  # STRUCTURE
  # ─────────────────────────────────────────────

  - id: API-004
    title: "Versioned routes — /v1/<resource>"
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      All routes versioned from day one: /v1/<resource>. No unversioned routes
      in production.
    checkable: true
    check_notes: >
      Python/FastAPI: check route decorators (@app.get, @router.get, etc.)
      for /v1/ prefix. Flag unversioned routes (except /health, /docs, /openapi.json).
      TypeScript/Hono: check route handler registrations (app.get, app.post,
      router.get, etc.) for /v1/ path prefix. Flag routes without it.
      Exception: /health, /metrics, and OpenAPI spec endpoints do not require
      versioning.
    added: 2026-03

  - id: API-005
    title: Response envelope on all endpoints
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      All responses wrapped: { data: ..., meta: { count, version } }.
      Errors: { error: { code, message } }. No bare arrays or inconsistent shapes.
    checkable: true
    check_notes: >
      Check response_model types on all endpoints. Flag endpoints returning bare
      arrays, raw dicts, or shapes inconsistent with the envelope standard.
    added: 2026-03

  - id: API-006
    title: owner_id on all tables
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      Every table includes owner_id (Clerk user ID). Not enforced as FK today
      but present for future multi-tenant use.
    checkable: true
    check_notes: >
      Search Python source files for SQLAlchemy model class definitions
      (subclasses of Base or DeclarativeBase). For each model, check that
      an owner_id column is declared. Flag any model missing owner_id unless
      it is explicitly a join table, lookup table, or internal-only table
      (check for a comment or naming convention indicating this — e.g. _lookup,
      _config suffix).
    added: 2026-03

  - id: API-007
    title: Clerk for authentication
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      Authentication via Clerk across all services. Consistent across the ecosystem.
    checkable: true
    check_notes: >
      Python services: search source files for clerk or verify_token imports.
      Check for a Depends(verify_token) pattern on protected route definitions.
      TypeScript services: check package.json for @clerk/clerk-sdk-node or
      equivalent. Search for verifyClerkToken from common-typescript-utils on
      protected routes. Flag if no Clerk dependency is found and the service
      has non-public endpoints. LLM: assess whether auth is applied
      consistently — check for routes that appear to handle user data but
      lack an auth dependency.
    added: 2026-03

  - id: API-008
    title: Public endpoints explicit and intentional
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      Public (unauthenticated) endpoints are explicitly documented and intentional —
      not accidental.
    checkable: true
    check_notes: >
      Identify all FastAPI route definitions (Python) or Hono route handlers
      (TypeScript) that have no auth dependency. Cross-reference with DOC-011:
      check whether each unauthenticated route has an OpenAPI description
      confirming intent. LLM: for each unauthed route found, assess whether
      it is plausibly intentional (e.g. health check, public read endpoint,
      contact form) or potentially accidental (e.g. write endpoint, user-
      specific data endpoint with no auth).
    added: 2026-03

  - id: API-009
    title: CORS configured via env var — never hardcoded
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      All API services configure CORS origins via a CORS_ORIGINS environment
      variable. Never hardcode allowed origins in source code. The env var
      holds a comma-separated list of allowed origins. Applies to both FastAPI
      (Python) and Hono (TypeScript) services. CORS_ORIGINS must be present
      in .env.example with a documented default.
    checkable: true
    check_notes: >
      Python/FastAPI: check for CORSMiddleware in app setup and CORS_ORIGINS
      env var usage — flag hardcoded origin strings.
      TypeScript/Hono: check for cors() middleware import and usage in app
      setup, with allowed origins sourced from process.env.CORS_ORIGINS.
      Flag if CORS_ORIGINS is hardcoded or CORS middleware is absent entirely.
      Check .env.example for CORS_ORIGINS entry.
    added: 2026-04

  - id: API-010
    title: /health endpoint on all API services
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      All Railway-hosted API services expose a GET /health endpoint returning
      {"status": "ok"} with HTTP 200. No authentication required. Used by
      Railway for health checks and as the liveness layer of the three-layer
      observability stack (CD-010). The endpoint must respond even if
      downstream dependencies (database, external APIs) are unavailable —
      it signals process liveness only, not dependency health.
    checkable: true
    check_notes: >
      Search route handler files for a GET /health route definition.
      The route must: return HTTP 200, return a JSON body with at minimum
      a 'status' field, require no authentication, and perform no database
      queries or external calls. Flag if absent or if the route performs
      DB queries (health endpoint must not depend on DB liveness).
    added: 2026-04

  - id: API-011
    title: Database migrations run via CI — never manually
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      Alembic (Python) and Drizzle Kit (TypeScript) migrations are applied
      as a CI/CD step before the new service version is live. Never run
      migrations manually against a Railway database. Manual migration against
      production bypasses the audit trail, risks applying the wrong version,
      and cannot be rolled back cleanly. The migration step in CI runs after
      tests pass and before the Railway deploy completes.
    checkable: true
    check_notes: >
      Python/FastAPI (Alembic): check ci.yml for 'alembic upgrade head' step
      in the deploy job. Flag if absent or if migration is run manually.
      TypeScript/Hono (Drizzle): check ci.yml for 'drizzle-kit push' or
      'drizzle-kit migrate' step. Flag if absent.
      For monorepo services, check the workspace root ci.yml — the migration
      step may be at root level rather than per-app. Do not flag if found
      at the monorepo root CI.
    added: 2026-04

  # ─────────────────────────────────────────────
  # AUTH (from code review audit)
  # ─────────────────────────────────────────────

  - id: AUTH-001
    title: No unverified write endpoints reachable from the public internet
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      Any FastAPI service with write endpoints (POST, PATCH, DELETE) that depend on
      an unverified header (X-Owner-Id or equivalent) must either be provably isolated
      on a private network (Railway private networking, no public port), OR have
      CLERK_AUTH_ENABLED=true and RS256 JWT verification active. A module-level
      docstring in auth.py documenting the current posture and upgrade path is
      required regardless of which condition is satisfied.
    checkable: true
    check_notes: >
      Verify: (1) service has no public port in Railway config, OR (2)
      CLERK_AUTH_ENABLED=true is set and auth middleware applied to all write routes.
      Check for auth.py module docstring.
    origin: >
      kaianolevine-api uses X-Owner-Id with no verification. Acceptable while all
      write callers are internal Railway services. Standard formalizes the boundary
      condition.
    added: 2026-03

  - id: AUTH-002
    title: API auth scheme and HTTP client must match
    status: requirement
    dimension: cross_repo_coherence
    severity: ERROR
    applies_to: [new_fastapi_service, new_hono_service]
    description: >
      When kaianolevine-api's auth scheme changes, CommonPythonApiClient._headers() in
      common-python-utils must change in the same release. A mismatch causes all
      pipeline writes to return 401. Auth mechanism used by the API and sent by its
      client must be documented in the same location (auth.py cross-referencing
      common-python-utils and vice versa).
    checkable: true
    check_notes: >
      Compare auth header set in CommonPythonApiClient._headers() against auth header
      expected by kaianolevine-api routes. Flag if they differ. Check auth.py for
      cross-reference comment to common-python-utils.
    origin: >
      common-python-utils references KAIANO_API_CLERK_TOKEN in .env.example but
      _headers() does not read it — a forward-reference that looks like a live feature.
    added: 2026-03
