# ecosystem-standards / documentation.yaml
# Documentation standards for all repos, modules, and API endpoints.
# Version: 1.0.0 · 2026-03

standards:

  # ─────────────────────────────────────────────
  # REPO-LEVEL
  # ─────────────────────────────────────────────

  - id: DOC-001
    title: README.md is mandatory
    status: requirement
    dimension: documentation_coverage
    severity: ERROR
    applies_to: [all]
    description: >
      Every repo has a README. It describes: purpose (one paragraph), inputs,
      outputs, environment variables, how to run locally, how to run tests,
      and versioning policy.
    checkable: true
    check_notes: >
      Check for README.md at repo root. Flag if absent or if it is clearly
      a template default with no real content.
    added: 2026-03

  - id: DOC-002
    title: README describes inputs and outputs
    status: requirement
    dimension: documentation_coverage
    severity: WARN
    applies_to: [all]
    description: >
      For processors: what files are expected, where they come from, what is
      produced and where it goes. For APIs: what endpoints exist and what they serve.
    checkable: true
    check_notes: >
      Search README.md for sections or keywords describing inputs and outputs.
      For cogs: look for mentions of source folder, Drive folder, input files,
      output, produces, writes to, or similar. For APIs: look for endpoint
      listings or links to OpenAPI docs. Flag if README contains fewer than
      two of these signals.
    added: 2026-03

  - id: DOC-003
    title: CHANGELOG.md required
    status: requirement
    dimension: documentation_coverage
    severity: WARN
    applies_to: [all]
    description: >
      Tracks meaningful changes per version. Not every commit — only changes that
      affect behavior, interface, or configuration. Managed by semantic-release.
      Never edited manually.
    checkable: true
    check_notes: >
      Check for CHANGELOG.md at repo root. Flag if absent.
    added: 2026-03

  - id: DOC-004
    title: .env.example is current
    status: requirement
    dimension: documentation_coverage
    severity: WARN
    applies_to: [all]
    description: >
      Every environment variable used by the service is documented in .env.example
      with a description and example value. Kept current — not a one-time artifact.
    checkable: true
    check_notes: >
      Check for .env.example at repo root. Flag if absent. Cross-reference with
      Settings class fields (see CFG-002 in python.yaml).
    added: 2026-03

  - id: DOC-005
    title: Design decisions captured
    status: requirement
    dimension: documentation_coverage
    severity: WARN
    applies_to: [all]
    description: >
      When a significant architectural decision is made, the rationale is written
      down — in docs/DESIGN.md, a CHANGELOG entry, or a README note. Not just what
      was decided but why.
    checkable: false
    added: 2026-03

  - id: DOC-013
    title: README "Running locally" section is complete
    status: requirement
    dimension: documentation_coverage
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      Every repo's README includes a "Running locally" section that covers
      five conceptual elements, expressed in the idioms of the repo's stack.

      Python repos (cogs, FastAPI services, libraries):
        (1) prerequisites — Python version (≥3.11) and uv
        (2) install — `uv sync --all-extras`
        (3) pre-commit — `uv run pre-commit install` and
            `uv run pre-commit run --all-files`
        (4) run — the exact command(s) to start the service or scripts
        (5) test — `uv run pytest` and the coverage variant

      TypeScript API services (Hono):
        (1) prerequisites — Node.js version and pnpm
        (2) install — `pnpm install`
        (3) lint/type-check — `pnpm lint` and `pnpm typecheck`
        (4) run — `pnpm dev` or equivalent dev server command
        (5) test — `pnpm test`

      Frontend sites and apps (Astro, React/Vite):
        (1) prerequisites — Node.js version and pnpm (or npm)
        (2) install — `pnpm install`
        (3) environment — copy `.env.example` to `.env` and fill values
        (4) run — `pnpm dev` or `astro dev`
        (5) build — `pnpm build` and confirm it succeeds

      The section must be kept current. Copy-paste from the README must
      work on a clean clone with no prior knowledge of the repo.
    checkable: true
    check_notes: >
      For Python repos: scan README.md for uv sync, pre-commit install,
      pre-commit run --all-files, uv run pytest, and a prerequisites
      mention (Python version or uv). Flag if any of the five are missing.

      For TypeScript API repos (api-service / Hono): scan for pnpm install,
      pnpm dev (or equivalent), pnpm test, and a Node.js prerequisites
      mention.

      For frontend repos (static-site, react-app): scan for an
      install command (pnpm install OR npm install), a dev command (pnpm dev,
      npm run dev, or astro dev), a build command (pnpm build or npm run build),
      and a reference to .env.example. Accept either package manager — do NOT
      flag npm as a violation for frontend repos. Flag only if the conceptual
      element (install / dev / build / env setup) is entirely absent.
    added: 2026-03

  # ─────────────────────────────────────────────
  # CODE-LEVEL
  # ─────────────────────────────────────────────

  - id: DOC-006
    title: Docstrings on all public functions and classes
    status: requirement
    dimension: documentation_coverage
    severity: WARN
    applies_to: [all]
    description: >
      All public functions and classes have docstrings. One sentence minimum
      describing what the function does, not how.
    checkable: true
    check_notes: >
      AST scan: find public functions and classes (not prefixed with _) lacking
      a docstring. Flag if any exist.
    added: 2026-03

  - id: DOC-007
    title: Pydantic field descriptions required
    status: requirement
    dimension: documentation_coverage
    severity: WARN
    applies_to: [pipeline-cog, api-service]
    description: >
      Pydantic model fields use the description parameter. Models are
      self-documenting — no separate documentation needed for data shapes.
    checkable: true
    check_notes: >
      Search all Python source files for Pydantic BaseModel subclasses. For
      each model field definition, check whether a Field(..., description=...)
      or Field(description=...) call is present. Flag any model field using
      plain type annotation without a Field description. Allow exemptions for
      private fields prefixed with underscore.
    added: 2026-03

  - id: DOC-008
    title: No dead code
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [all]
    description: >
      Commented-out code is removed, not left in place. Version control is the
      history — the codebase is the present.
    checkable: true
    check_notes: >
      Scan for large blocks of commented-out code (3+ consecutive commented lines
      that appear to be code, not documentation). Flag if found.
    added: 2026-03

  - id: DOC-009
    title: Split package identity documented at entry point
    status: requirement
    dimension: documentation_coverage
    severity: WARN
    applies_to: [all]
    description: >
      If a Python library's install name (pyproject.toml [project] name) differs
      from its import namespace (src/ directory name), both names and their
      relationship must be documented in __init__.py docstring. README must show
      both correct install snippet and correct import path.
    checkable: true
    check_notes: >
      Compare [project] name in pyproject.toml against directory name under src/.
      If they differ, verify __init__.py docstring mentions both names and README
      contains both install and import examples.
    origin: >
      common-python-utils/__init__.py had broken install URL and no explanation
      of the name split. New consumers had to discover the import namespace by
      inspecting src/.
    added: 2026-03

  # ─────────────────────────────────────────────
  # API DOCUMENTATION
  # ─────────────────────────────────────────────

  - id: DOC-010
    title: OpenAPI docs are first-class
    status: requirement
    dimension: documentation_coverage
    severity: ERROR
    applies_to: [api-service]
    description: >
      FastAPI's /docs is a deliverable, not a side effect. Every endpoint must
      be complete and accurate before the service is considered done. All endpoints
      have summary, description, and response_model defined.
    checkable: true
    check_notes: >
      Scan FastAPI route decorators for presence of summary=, description=, and
      response_model=. Flag any endpoint missing any of the three.
    added: 2026-03

  - id: DOC-011
    title: Public endpoints documented as intentional
    status: requirement
    dimension: documentation_coverage
    severity: WARN
    applies_to: [all]
    description: >
      Public (unauthenticated) endpoints include a note in their description
      confirming they are intentionally public.
    checkable: true
    check_notes: >
      For FastAPI services, identify routes with no auth dependency (no
      Depends(verify_token) or equivalent in the route signature). For each
      such route, check the OpenAPI description field contains a phrase
      confirming intent — e.g. "intentionally public", "no auth required",
      "read-only public". Flag unauthenticated routes with no such note.
    added: 2026-03

  # ─────────────────────────────────────────────
  # STANDARDS DOCUMENT ITSELF
  # ─────────────────────────────────────────────

  - id: DOC-012
    title: Standards document is versioned
    status: requirement
    dimension: standards_currency
    severity: WARN
    applies_to: [all]
    description: >
      Every update to the standards repo increments the version in index.yaml.
      The AI evaluator always references a specific version. Evaluations without
      a standards version reference are invalid.

      Adoption note (added 2026-04): This requirement was formalised in
      standards v2.4.0. All existing repos are in a grace period — findings
      for absent standards_version are advisory (WARN) until the next
      major version of each repo ships with this field present. New repos
      starting after v2.4.0 must comply from day one.
    checkable: true
    check_notes: >
      This rule has two distinct check surfaces:
      (1) The standards repo itself: verify index.yaml has a version field
          and it is incremented on every release. This is the authoring-side
          check and should always pass.
      (2) Evaluation call metadata: verify that evaluation records written
          to pipeline_evaluations include a standards_version field matching
          the current index.yaml version. This is a runtime check — look for
          standards_version in the evaluation payload or submission code.
          Flag if absent, but apply WARN severity during the grace period
          (see adoption note in description). Do not flag the standards repo
          itself for this — it is the source of truth, not a consumer of it.
    added: 2026-03
