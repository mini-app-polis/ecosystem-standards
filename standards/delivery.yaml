# ecosystem-standards / delivery.yaml
# Continuous delivery, versioning, and observability standards.

standards:

  # ─────────────────────────────────────────────
  # OBSERVABILITY
  # ─────────────────────────────────────────────

  - id: CD-001
    title: Feature flags for major functionality toggles
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      Feature flags are used to decouple deployment from release. They gate
      major sections of functionality — not minor implementation details.
      The canonical use cases are:

        Kill switches: disable a risky integration (e.g. Anthropic API calls
          in evaluator-cog) without a redeploy.
        Readiness gates: API ships a new endpoint; frontend UI is hidden until
          the flag is enabled. Allows frontend code to be merged and deployed
          independently of API readiness.
        Maintenance mode: return 503 gracefully during migrations without
          touching code.

      Flags are stored in the feature_flags table in api-kaianolevine-com's
      PostgreSQL database and served via GET /v1/feature-flags.
      The public read endpoint is unauthenticated. Write endpoints
      (POST, PATCH, DELETE /v1/feature-flags/:key) require Clerk JWT auth
      with admin role.

      Flag naming convention: <service>.<feature>
      Examples:
        evaluator_cog.llm_soft_rules
        evaluator_cog.conformance_check
        watcher_cog.drive_polling
        api.maintenance_mode

      Flag anatomy — each flag must have:
        key:         string identifier
        enabled:     boolean
        description: why it exists and when it should be deleted
        permanent:   boolean — true for infrastructure flags (maintenance_mode),
                     false for rollout/readiness flags (must be deleted post-rollout)

      Lifecycle contract:
        1. Ship code with flag check
        2. Deploy and activate when ready by flipping the flag via the admin panel
        3. For non-permanent flags: ship a follow-up PR removing the flag check
           once the feature is fully rolled out and stable
        4. Delete the DB row after the cleanup PR merges
        Include a comment in code pointing to the flag key so it is easy to find:
          # feature flag: evaluator_cog.llm_soft_rules

      Flags are NOT used for:
        - Fine-grained A/B testing or percentage rollouts
        - Per-user targeting
        - Replacing Prefect flow configuration
        - Gating minor implementation details

      Clients check flags at runtime (not build time) via a short-TTL
      in-memory cache (30–60 seconds per process) to avoid hitting the API
      on every request. Astro static sites fetch flags client-side on load.
      Fail-open or fail-closed behavior must be intentional and documented
      per flag.
    checkable: false

  - id: CD-002
    title: Sentry for error tracking — all production services
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, react-app]
    description: >
      All production services integrate Sentry for unhandled exception
      tracking. This includes FastAPI services, Hono services, and Python
      cogs (always-on worker services). Free tier is
      sufficient. Sentry is initialised at service entry point before
      any application logic runs. SENTRY_DSN is set as an environment
      variable — never hardcoded. The same Sentry project may be shared
      across related services or a dedicated project used per service.
      Sentry covers Layer 3 observability (unhandled exceptions). It does
      not replace structured logging (Layer 2) or liveness monitoring (Layer 1).
    checkable: true
    check_notes: >
      Check for sentry-sdk in pyproject.toml (Python) or @sentry/node in
      package.json (TypeScript). Check for sentry_sdk.init() or Sentry.init()
      call at service entry point. Check for SENTRY_DSN in .env.example.
      Flag any production service missing any of these three.

  - id: CD-003
    title: Structured logging via shared library
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      All Python services use common-python-utils logger. All TypeScript
      services use common-typescript-utils logger. Never use print() in production
      code paths. Log output is JSON-formatted in production.

      Standard log event shape (all services):
        timestamp: ISO 8601
        service:   repo name (e.g. watcher-cog, api-kaianolevine-com)
        level: DEBUG | INFO | WARN | ERROR
        category: infra | pipeline | data | api
        event:     snake_case event name (e.g. trigger_fired, file_processed)
        context: key-value pairs specific to the event

      Category definitions:
        infra:    service lifecycle, triggers fired/not fired, heartbeats,
                  Drive poll results
        pipeline: file processed/skipped/failed, pipeline completed/failed,
                  Prefect flow run created
        data:     data quality issues, schema violations, evaluation findings,
                  duplicate detection
        api:      HTTP errors (4xx/5xx), slow responses (>2s), external
                  API failures, auth failures

      Emoji prefixes used for human-readable local output only.
      Structured JSON is the production format.
    checkable: true
    check_notes: >
      Scan source files for print() statements in production code paths.
      Flag if found. Check that logger is imported from shared library,
      not configured inline per-service.

  # ─────────────────────────────────────────────
  # CI/CD
  # ─────────────────────────────────────────────

  - id: CD-004
    title: GitHub Actions version tags must be valid
    status: requirement
    dimension: cd_readiness
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      All "uses: owner/repo@vN" references in .github/workflows/ must reference
      version tags that exist in the action's release history. Invalid version tags
      cause CI to fail silently. Current pinned versions (March 2026):
      actions/checkout@v6, actions/setup-node@v6, pnpm/action-setup@v5,
      dopplerhq/secrets-fetch-action@v2.0.0, astral-sh/setup-uv@v7.
      Verify the tag exists before committing any version pin.
    checkable: true
    check_notes: >
      Parse all uses: references in .github/workflows/*.yml. For each action,
      verify the pinned version tag exists via the GitHub API. Flag any returning 404.
    origin: "Invalid version tags cause CI to fail silently, creating false confidence in a passing pipeline."

  # ─────────────────────────────────────────────
  # VERSIONING
  # ─────────────────────────────────────────────

  - id: VER-001
    title: Conventional Commits format
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      All commit messages follow: type: description.
      Types: feat, fix, docs, refactor, chore, test, ci.
    checkable: true
    check_notes: >
      Fetch the last 20 commit messages from the repo's git log. Check each
      message against the conventional commits pattern: ^(feat|fix|docs|
      refactor|chore|test|ci|perf|build)(\(.+\))?: .+. Flag commits that
      do not match. Exempt merge commits and semantic-release chore commits
      (chore(release):).

  - id: VER-002
    title: BREAKING CHANGE footer for major bumps
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      Use explicit BREAKING CHANGE in commit body for major version bumps.
      The feat!: shorthand is unreliable. Correct pattern using two -m flags:
        git commit -m 'feat: description' -m 'BREAKING CHANGE: explanation'
    checkable: true
    check_notes: >
      Scan CHANGELOG.md for major version entries (lines matching ## [X.0.0]).
      For each major version entry, check the corresponding git tag commit
      message for a BREAKING CHANGE footer. Flag any major version bump where
      the triggering commit lacks a BREAKING CHANGE footer.

  - id: VER-003
    title: semantic-release on all repos
    status: requirement
    dimension: cd_readiness
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      Every repo has .releaserc.json and a release job in ci.yml. On merge to main:
      tests run, semantic-release reads commits, determines bump, updates version
      file, updates CHANGELOG.md, creates git tag, creates GitHub Release.
    checkable: true
    check_notes: >
      Check for .releaserc.json at repo root and a release job in
      .github/workflows/ci.yml. Flag if either is absent.

  - id: VER-004
    title: Never manually edit version files or CHANGELOG
    status: requirement
    dimension: cd_readiness
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      Never manually edit version in pyproject.toml or package.json. Never manually
      edit CHANGELOG.md. Both are owned by semantic-release.
    checkable: true
    check_notes: >
      Check CHANGELOG.md for lines that do not follow the semantic-release
      output format (## [X.Y.Z](...) (YYYY-MM-DD) headers, ### Features /
      ### Bug Fixes sections). Hand-written entries have prose paragraphs
      or ## X.Y.Z — date formats. Flag if any section deviates from the
      machine-generated format. Also check pyproject.toml version — if it
      does not match the latest CHANGELOG.md version, flag as manually edited.

  - id: VER-005
    title: "fetch-depth: 0 on CI checkout"
    status: requirement
    dimension: cd_readiness
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      All CI jobs that run semantic-release must use fetch-depth: 0 on the checkout
      step. Without this semantic-release cannot read full git history and will not
      release correctly.
    checkable: true
    check_notes: >
      Scan .github/workflows/ci.yml for actions/checkout steps in the release job.
      Flag if fetch-depth: 0 is absent.

  - id: VER-006
    title: Plugins installed explicitly before semantic-release
    status: requirement
    dimension: cd_readiness
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      semantic-release plugins are installed via npm install --no-save in the release
      job before running npx semantic-release. Not via package.json. Required because
      npx only installs the core package.
    checkable: true
    check_notes: >
      Check release job in ci.yml for npm install --no-save step before npx
      semantic-release. Flag if absent.

  - id: CD-005
    title: Prefect Cloud for pipeline observability
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      All pipeline flows connect to Prefect Cloud (free tier). Run history, step logs,
      and flow state are visible at app.prefect.cloud. GitHub Actions logs are for
      deep debugging only — not the primary observability surface.
    checkable: false

  - id: CD-006
    title: GitHub Actions is CI/CD only — not a trigger relay
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      GitHub Actions handles lint, tests, deploys, and semantic-release.
      It does not trigger pipeline flows. Drive-event triggers go through
      watcher-cog. Scheduled and manual triggers go through Prefect
      deployments. repository_dispatch as a trigger relay for cogs
      is a retired pattern.
    checkable: false

  - id: CD-007
    title: Healthchecks.io for trigger cogs
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog]
    description: >
      Trigger cogs — services running their own continuous polling loop without
      external orchestration visibility — integrate Healthchecks.io as a dead
      man's switch. If a trigger cog silently dies, no flow runs are triggered
      and the failure is invisible to Prefect Cloud.
      The service pings HEALTHCHECKS_URL on every poll cycle. If the ping goes
      silent beyond the grace period, Healthchecks.io sends an email alert.
      Recommended settings: period 1 minute, grace 5 minutes.
      HEALTHCHECKS_URL is set as an environment variable — never hardcoded.
      Free tier is sufficient.
      Pipeline cogs using prefect.serve() are exempt — Prefect Cloud provides
      run-level liveness monitoring and Railway provides process-level restart.
      The test: if a silent crash would cause work to stop being triggered with
      no external visibility, Healthchecks is required. If Prefect would surface
      the failure anyway, it is not.
    checkable: true
    check_notes: >
      Apply only to trigger cogs (cog_subtype: trigger in ecosystem.yaml).
      For those services: check for HEALTHCHECKS_URL in .env.example and a
      heartbeat ping call in the main poll loop. Flag trigger cogs missing
      this integration. Do not flag pipeline cogs (cog_subtype: pipeline)
      — they are exempt by design.

  - id: CD-008
    title: Log levels used consistently and intentionally
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      Log levels follow a strict contract across all services:
        DEBUG: internal state useful for local debugging only.
               Never emitted in production by default.
        INFO:  meaningful lifecycle events — service started, file
               processed, trigger fired, pipeline completed. Reviewable
               weekly. Default production level.
        WARN:  something unexpected happened but the service recovered.
               Skipped files, retried calls, degraded behaviour. Reviewed
               promptly.
        ERROR: something failed and requires attention. Unhandled
               exceptions, failed triggers, data integrity violations.
               Reviewed immediately.
      Never use ERROR for expected failure modes (e.g. file not found
      when that is a valid outcome). Never use INFO for high-frequency
      noise that would obscure meaningful events.
    checkable: true
    check_notes: >
      Search all Python source files for logger.debug, logger.info,
      logger.warning, logger.error calls. Flag logger.error used for
      file-not-found or similar expected outcomes (look for patterns like
      'not found', 'no files', 'skipping' adjacent to error calls). Flag
      logger.info calls inside tight loops or per-item processing that would
      produce high-frequency noise. Flag logger.debug calls that are present
      in production code paths without a DEBUG guard.

  - id: CD-009
    title: Structured log event shape — all services
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, react-app]
    description: >
      All meaningful log events emitted by production services include
      these fields:
        timestamp: ISO 8601
        service:   repo name (e.g. watcher-cog, api-kaianolevine-com)
        level:     DEBUG | INFO | WARN | ERROR
        category:  infra | pipeline | data | api
        event:     snake_case event name (e.g. trigger_fired, file_processed)
        context:   key-value pairs specific to the event

      Category definitions:
        infra:    service lifecycle, triggers fired/not fired, heartbeats,
                  Drive poll results
        pipeline: file processed/skipped/failed, pipeline completed/failed,
                  Prefect flow run created
        data:     data quality issues, schema violations, evaluation findings,
                  duplicate detection
        api:      HTTP errors (4xx/5xx), slow responses (>2s), external
                  API failures, auth failures

      Log output is JSON in production, human-readable with emoji prefixes
      in local development. The shared library (common-python-utils for
      Python, common-typescript-utils for TypeScript) provides the logger — services
      do not configure logging inline.
    checkable: true
    check_notes: >
      Check that log calls use the shared library logger, not a custom
      inline configuration. Flag services importing logging directly and
      configuring their own handler/formatter without using the shared library.

  - id: CD-010
    title: Three-layer observability stack — all production services
    status: requirement
    dimension: cd_readiness
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service, react-app]
    description: >
      Every production service implements all three observability layers:
        Layer 1 — Liveness:    Healthchecks.io for always-on workers.
                               Railway auto-restart for all services.
        Layer 2 — Structured logs: common-python-utils or common-typescript-utils
                               logger emitting JSON events with standard shape.
                               Queryable in Railway log viewer or Better Stack.
        Layer 3 — Exceptions:  Sentry capturing all unhandled exceptions
                               with full stack trace and context.
      These three layers are non-overlapping and non-redundant:
        Layer 1 catches: process died, service unreachable
        Layer 2 catches: business logic errors, skipped work, slow operations
        Layer 3 catches: unhandled exceptions and crashes
      A service missing any layer has a blind spot in production.
      Pipelines additionally require Prefect run history as a fourth layer
      covering orchestration-level observability.
    checkable: true
    check_notes: >
      For each production service, verify all three layers are present.
      Layer 1: HEALTHCHECKS_URL in .env.example + ping call in main loop
               (worker services only — HTTP services rely on Railway restart).
      Layer 2: shared library logger imported and used throughout.
      Layer 3: Sentry initialised at entry point, SENTRY_DSN in .env.example.
      Flag any service missing any layer.

      SUPERSESSION: When CD-010 fires and flags Layer 2 or Layer 3 as absent,
      do not also raise separate findings for CD-009 (structured logging) or
      CD-002 (Sentry) for the same service in the same run. CD-010 is the
      composite rule — CD-002 and CD-009 are its sub-components. Raising all
      three produces duplicate findings for one root cause. If CD-010 passes
      (all layers present), CD-002 and CD-009 may still fire independently
      for structural issues not captured by the composite check.

  - id: CD-011
    title: Doppler as canonical secret store
    status: requirement
    dimension: cd_readiness
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      Doppler is the single source of truth for all infrastructure secrets
      across the MiniAppPolis ecosystem. This includes API keys, database
      URLs, service tokens, internal API keys, Sentry DSNs, Healthchecks
      URLs, and Clerk credentials.

      Doppler syncs automatically to:
        Railway:        all API services and cogs receive secrets via
                        the Doppler → Railway native sync
        GitHub Actions: CI secrets synced via Doppler → GitHub integration
        Cloudflare Pages: secrets synced via Doppler CLI in CI/CD

      Secret management workflow:
        - All secret changes are made in Doppler only
        - Doppler pushes changes to downstream platforms automatically
        - Never manually set secrets in Railway, GitHub, or Cloudflare
          if Doppler is managing that service
        - .env.example lists all required secret keys with no values —
          this file is the human-readable contract of what a service needs

      Doppler project structure:
        One Doppler project per service or cog.
        Environments: development, staging, production (minimum).

      The only known carve-out is Prefect Cloud. Prefect uses its own
      encrypted Blocks for flow-level secrets. Prefect Blocks are managed
      directly in Prefect Cloud and are not synced from Doppler. When a
      secret used in a Prefect Block is rotated, Prefect must be updated
      manually. This is a known limitation — document it per-secret in
      Doppler's description field.
    checkable: true
    check_notes: >
      Check that .env.example exists and lists all required secret keys.
      Flag any service with secrets hardcoded in source or committed
      .env files. Flag any service manually setting Railway env vars
      that should be Doppler-managed.

  - id: CD-012
    title: Internal service-to-service auth via per-caller API keys
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      Internal calls between Railway services and cogs use per-caller
      API keys passed via the X-Internal-API-Key header. Each caller
      (each cog or service making internal API calls) has its own key —
      not a single shared secret across all callers.

      Per-caller keys allow:
        - Independent rotation without touching all callers
        - Caller identity logging on every internal request
        - Revocation of a single caller's access without affecting others

      All internal API keys are stored in Doppler and injected at runtime.
      The receiving service (api-kaianolevine-com) validates the key and
      logs the caller identity on every internal request.

      common-python-utils provides get_internal_headers() returning the
      correct header dict for outgoing internal requests. All Python cogs
      use this utility — never construct the header inline.

      Clerk JWT auth is for user-facing requests only. Internal
      service-to-service calls never use Clerk JWTs.
    checkable: false

  - id: CD-013
    title: Feature flag admin panel in kaianolevine.com
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [api-service]
    description: >
      The admin control panel for feature flags lives at an /admin route
      in the kaianolevine.com software portfolio site. It is gated behind
      Clerk authentication with admin role verification.

      Capabilities:
        - View all flags and their current state
        - Toggle flags on/off
        - Create new flags (key, description, permanent boolean)
        - Delete flags (permanent flags require confirmation)

      The admin panel calls authenticated write endpoints on
      api-kaianolevine-com. The public GET /v1/feature-flags endpoint
      remains unauthenticated for use by Astro sites and cogs.

      Each site (kaianolevine.com, wcs.kaianolevine.com, deejaytools.com)
      has its own Clerk application and independent user pool. Admin access
      to the flag panel is scoped to the kaianolevine.com Clerk app only.
    checkable: false

  - id: CD-014
    title: Cloudflare Pages for all static site deployments
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [static-site]
    description: >
      All Astro static sites deploy to Cloudflare Pages. Not Netlify, not
      Vercel, not GitHub Pages. Cloudflare Pages provides dev/prod environment
      split via branch deploy previews, zero-config CDN, and consistent with
      the broader ecosystem's Cloudflare footprint (Workers, DNS). New static
      sites are connected to Cloudflare Pages before being considered deployed.
    checkable: true
    check_notes: >
      For Astro site repos, check ci.yml for Cloudflare Pages deploy steps or
      wrangler references. Check README for Cloudflare Pages deploy instructions
      or URLs (pages.dev domain). Flag if a different deployment target is
      referenced (netlify.toml, vercel.json, .github/workflows with gh-pages).
      If no deployment target is detectable, flag as unverified.

  - id: CD-015
    title: Prefect serve() — no work pool
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog]
    description: >
      Cogs register flows using prefect.serve() running in-process on Railway.
      The Prefect work pool architecture is not used — it requires an external
      agent process and adds infrastructure complexity with no benefit at this
      scale. prefect.serve() runs the flow directly in the cog's Railway
      process with full access to environment variables and the filesystem.
      Any cog using flow.deploy() targeting a work pool, or referencing a
      work pool name in its Prefect configuration, is violating this pattern.
    checkable: true
    check_notes: >
      Search Python source files for flow.deploy() calls or work_pool_name
      references. Search prefect.yaml if present for work pool configuration.
      Flag any found. Confirm prefect.serve() is used as the flow registration
      mechanism in the cog's main entry point. Flag if neither serve() nor
      deploy() is found — the registration pattern is missing entirely.

  - id: VER-007
    title: Pull before branching
    status: convention
    dimension: cd_readiness
    severity: INFO
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      Always run git pull origin main before creating a new feature branch.
      Prevents merge conflicts with semantic-release commits
      (chore(release): X.Y.Z [skip ci]) that land on main after every release.
    checkable: false

  - id: VER-008
    title: .releaserc.json assets must include all version-managed files
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service, static-site, react-app]
    description: >
      The assets array in the @semantic-release/git plugin must include every
      file that semantic-release modifies during a release. At minimum:
      CHANGELOG.md plus whichever version file the exec plugin updates —
      index.yaml for ecosystem-standards, pyproject.toml for Python services,
      package.json for TypeScript services. If a file is bumped by the exec
      prepareCmd but not listed in assets, semantic-release commits back to
      main without it, creating a version drift that is invisible until the
      next clone.
    checkable: true
    check_notes: >
      Parse .releaserc.json. Find the @semantic-release/exec plugin and extract
      the prepareCmd. Identify which files the prepareCmd writes to (pyproject.toml,
      index.yaml, package.json, etc). Find the @semantic-release/git plugin and
      extract its assets array. Flag any file written by prepareCmd that is not
      present in assets. Also flag if CHANGELOG.md is absent from assets.
