# ecosystem-standards / frontend.yaml
# Standards for all frontend sites and web applications.
#
# Decision rule: if the primary product is content delivery, use Astro.
# If it is an application with persistent UI state and user actions, use React.

standards:

  # ─────────────────────────────────────────────
  # FRAMEWORK CHOICES
  # ─────────────────────────────────────────────

  - id: FE-001
    title: Astro for all static sites
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [static-site]
    description: >
      All portfolio, technical, and community sites use Astro. Static-first,
      component islands for interactivity. If the primary product is content
      delivery, use Astro. If it is an app with persistent UI state, use React.
    checkable: true
    check_notes: >
      Check package.json for astro in dependencies. Check astro.config.mjs
      or astro.config.ts exists. Flag if the site type is static/community/
      portfolio but the framework dependency is React-only (vite + react
      without astro). LLM: given the repo name and README description, assess
      whether this is a static site (should use Astro) or a web app with
      persistent UI state (React is appropriate).

  - id: FE-002
    title: Vite + React + TypeScript for web apps
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [react-app]
    description: >
      Standard stack for all React web apps. Vite for bundling, React 19,
      TypeScript throughout. No exceptions.
    checkable: true
    check_notes: >
      Check package.json for vite, react, and typescript in dependencies.
      Check tsconfig.json exists. Flag if package.json has webpack, create-
      react-app, or next as the bundler. Flag if TypeScript is absent from
      a React app repo. LLM: assess whether the stack matches the standard
      — look for any non-standard bundler or UI framework choices and flag
      with explanation.

  - id: FE-003
    title: Tailwind CSS for styling
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [react-app]
    description: >
      Tailwind is the styling primitive for all React apps and Astro sites.
      No CSS modules, no styled-components, no other CSS framework.
    checkable: true
    check_notes: >
      Check package.json for tailwindcss in dependencies. Check for
      tailwind.config.js, tailwind.config.ts, OR tailwind.config.mjs (Astro
      projects use .mjs). For Astro repos, also accept @astrojs/tailwind in
      astro.config.mjs or astro.config.ts as a valid Tailwind signal. Search
      source files for className strings containing Tailwind utility classes.
      Flag if styled-components, emotion, CSS modules (.module.css imports), or
      another CSS framework is present alongside or instead of Tailwind.
      LLM: assess whether Tailwind is the primary styling mechanism or whether
      another approach is dominant.

  - id: FE-004
    title: shadcn/ui for components
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [react-app]
    description: >
      shadcn/ui is the component library standard. Components are copied into
      src/components/ui/ — not installed as a dependency. Built on Radix UI
      primitives and Tailwind.
    checkable: true
    check_notes: >
      Check package.json for @radix-ui dependencies (indirect signal for
      shadcn). Check for a src/components/ui/ directory containing component
      files. Flag if a ui/ directory is absent in a React app. Flag if
      shadcn components appear to be installed as a package dependency rather
      than copied into src/. LLM: assess whether the component patterns in
      use match shadcn/ui conventions — look for Button, Dialog, Input
      components in src/components/ui/.

  - id: FE-005
    title: React Hook Form + Zod for forms and validation
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [react-app]
    description: >
      All forms use React Hook Form. All validation schemas use Zod. These are
      assumed by shadcn/ui form components and are the ecosystem standard.
    checkable: true
    check_notes: >
      Check package.json for react-hook-form and zod in dependencies. Search
      source files for useForm imports from react-hook-form and z. from zod.
      Flag if a form element exists in JSX/TSX files without a corresponding
      useForm hook. Flag if form validation is implemented with custom state
      (useState for each field) rather than react-hook-form. LLM: assess
      whether form handling is consistent — look for any forms bypassing
      the standard pattern.

  # ─────────────────────────────────────────────
  # DATA INTEGRATION
  # ─────────────────────────────────────────────

  - id: FE-006
    title: Graceful degradation — build succeeds without API
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [static-site, react-app]
    description: >
      Build succeeds with empty or unavailable API data. Site does not break if
      API is down.
    checkable: true
    check_notes: >
      Search Astro data files and page components for API fetch calls. Check
      whether each fetch is wrapped in a try/catch with a fallback value (empty
      array, null, default object). Flag any fetch without error handling that
      would cause a build failure if the API is unavailable. LLM: assess
      whether the fallback handling is substantive — a caught error that re-
      throws or logs without returning a safe default does not satisfy this rule.

  - id: FE-007
    title: No hardcoded API URLs
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [static-site, react-app]
    description: >
      No hardcoded API URLs. PUBLIC_API_URL (Astro) or VITE_API_URL (React)
      env var used throughout.
    checkable: true
    check_notes: >
      Scan source files for hardcoded API URL strings (http://localhost, railway.app,
      etc.). Flag if found outside of .env files.

  - id: FE-008
    title: Pinned starter version
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [static-site]
    description: >
      Astro sites pin their starter version. Upstream preserved in-repo
      for reference. Do not blindly upgrade starter versions — pin and
      document the version in use.
    checkable: true
    check_notes: >
      Verify Astro core dependencies are pinned to exact versions:
        (1) In package.json `dependencies` and `devDependencies`, the
            following packages must have exact version specifiers (no
            leading `^`, `~`, `>=`, `*`, or `latest`):
              - `astro`
              - `@astrojs/*` (any package starting with this prefix)
        (2) Flag any of the above with a range specifier.
        (3) Flag any site where `astro` is not in dependencies or
            devDependencies at all — this rule only applies to repos
            using Astro (type: static-site is the scoping condition).

  - id: FE-009
    title: Build-time data for static content
    status: requirement
    dimension: structural_conformance
    severity: INFO
    applies_to: [static-site]
    description: >
      Infrequently-changing data (collections, summaries) fetched at
      build time via Astro data files or frontmatter. Do not make
      runtime API calls for content that could be fetched at build time.
    checkable: true
    check_notes: >
      Scan src/**/*.astro files for runtime fetch calls in contexts
      that should be build-time:
        (1) Identify fetch() calls inside <script> tags (runtime) vs
            inside the component's --- frontmatter block (build time).
        (2) For fetch() calls at runtime, flag any whose URL matches
            an endpoint that has a build-time counterpart. Heuristic:
            if the same URL appears in both a frontmatter fetch
            (anywhere in the repo) and a runtime fetch, the runtime
            one is a candidate for build-time promotion.
        (3) Exempt: fetch() calls inside an Astro component with a
            `client:*` directive on the wrapping element AND a
            corresponding FE-010 island classification — those are
            covered by FE-010 (runtime for interactive demos).
      Note: false positives are tolerable here (severity INFO). The
      goal is to surface candidate runtime-to-build-time migrations,
      not block on every edge case.

  - id: FE-010
    title: Runtime queries for interactive demos only
    status: requirement
    dimension: structural_conformance
    severity: INFO
    applies_to: [static-site]
    description: >
      Live API queries reserved for search, filtering, and interactive
      demo surfaces. Implemented via Astro component islands. Document
      which endpoints are called at runtime vs build time.
    checkable: true
    check_notes: >
      For every runtime fetch() call in src/**/*.astro (inside <script>
      tags, not frontmatter), verify:
        (1) The containing component file has at least one `client:*`
            directive (client:load, client:idle, client:visible, etc.)
            on its containing island element. Flag runtime fetches in
            components with no client:* directive — those are either
            dead code or misplaced.
        (2) Endpoints called at runtime should be documented. Check
            for a README.md or docs/*.md file in the repo that
            mentions the endpoint URL or route path. Flag runtime
            fetches whose target endpoint is not mentioned in any
            documentation file. This is advisory (INFO severity).
