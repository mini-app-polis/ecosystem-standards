# ecosystem-standards / testing.yaml
# Testing standards for all Python cogs and FastAPI services.
#
# GAP: Most existing cogs currently have import-level tests only.
# Per-repo remediation sequencing lives in BACKLOG.md — see TEST-GAP-001.

standards:

  - id: TEST-000
    title: Testing pyramid — right ratio, not maximum coverage
    status: convention
    dimension: testing_coverage
    severity: INFO
    applies_to: [all]
    description: >
      The goal is the right ratio of test types, not maximum line coverage.
      Unit tests (many): pure functions in isolation, no I/O, no external calls. Fast.
      Integration tests (some): cog interaction with mocked external dependencies.
        One per major external integration.
      E2E tests (few): happy path only, run nightly not on every commit.
        One per pipeline covering the full flow.
    checkable: false

  # ─────────────────────────────────────────────
  # CRITICAL PATH — PYTHON COGS
  # Four tests required per cog. Not 100% line coverage —
  # these four specific paths.
  # ─────────────────────────────────────────────

  - id: TEST-001
    title: Normalization test required per cog
    status: requirement
    dimension: testing_coverage
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service]
    description: >
      A test that verifies the normalization/cleaning logic on representative input.
      Covers the core transformation the cog exists to do.
    checkable: true
    check_notes: >
      LLM CHECK.
      Scan all files under tests/**/*.py and identify test functions
      (functions whose name starts with `test_`). Pass if at least one
      test function satisfies BOTH:
        (a) Its name or docstring references normalization, cleaning,
            transformation, parsing, or the cog's core transform verb
            (e.g. `test_normalize_*`, `test_clean_*`, `test_parse_*`,
            `test_transform_*`).
        (b) Its body passes a representative input to the cog's
            normalization entry point (a function exported from
            src/**/*.py that performs the transform) and asserts the
            returned value equals or contains a normalized expected
            value — i.e. the assertion is about the SHAPE or CONTENT
            of the transform's output, not just that it did not raise.
      Flag the repo if no test function meets both (a) and (b).
      This is LLM-judged because the cog's "core transformation" is
      not mechanically derivable from the repo alone — it requires
      reading the cog's purpose (ecosystem.yaml description + README)
      to know what to look for in tests.

  - id: TEST-002
    title: Deduplication test required per cog
    status: requirement
    dimension: testing_coverage
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service]
    description: >
      A test that verifies duplicate inputs are correctly identified and handled —
      not silently overwritten.
    checkable: true
    check_notes: >
      LLM CHECK.
      Scan tests/**/*.py for test functions satisfying BOTH:
        (a) Name or docstring references duplicates, deduplication,
            duplicate detection, or overwrite prevention (common
            patterns: `test_duplicate_*`, `test_dedup_*`,
            `test_no_overwrite_*`, `test_possible_duplicate_*`).
        (b) Body passes the same input twice (or two inputs with
            identical canonical content) to the cog and asserts the
            second invocation produced a dedup outcome appropriate
            to the cog's chosen strategy (see PY-013) — e.g. a
            file rename with `possible_duplicate_` prefix, a
            skip/no-op return value, an `on_conflict_do_nothing`
            DB outcome, an assertion that the original was not
            overwritten, or a uniqueness-constraint `IntegrityError`
            that the cog handles by skipping.
      Flag the repo if no test function meets both (a) and (b).

  - id: TEST-003
    title: Failure path test required per cog
    status: requirement
    dimension: testing_coverage
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service]
    description: >
      A test that verifies the cog handles a bad input correctly — logs the
      error, marks the file, and continues rather than aborting.
    checkable: true
    check_notes: >
      LLM CHECK.
      Scan tests/**/*.py for test functions satisfying ALL THREE:
        (a) Name or docstring references the failure path
            (e.g. `test_*_failure`, `test_*_invalid`, `test_*_malformed`,
            `test_*_error_handling`, `test_failed_prefix`).
        (b) Body passes a malformed, invalid, or incomplete input
            (e.g. missing required field, bad type, corrupted bytes)
            to the cog's entry point.
        (c) Asserts the cog did NOT raise to the caller — either the
            call completed and returned, OR it wrote a FAILED_ prefix
            (see PY-012), OR it logged an error and moved on. A test
            that uses `pytest.raises(...)` WITHOUT also asserting
            continuation (e.g. that subsequent items in a batch still
            processed) does not satisfy this rule — that pattern
            verifies the exception exists, not that the pipeline is
            resilient.
      Flag the repo if no test function meets all three.

  - id: TEST-004
    title: Output shape test required per cog
    status: requirement
    dimension: testing_coverage
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service]
    description: >
      A test that verifies the output (JSON schema, DB row, or file structure)
      matches the expected contract.
    checkable: true
    check_notes: >
      LLM CHECK.
      Scan tests/**/*.py for test functions whose body contains at
      least one assertion about the SHAPE of the cog's output:
        - `assert <result>.keys() == {...}` or `assert set(<result>) == {...}`
          (dict shape).
        - `assert isinstance(<result>, SomeModel)` where SomeModel is
          a Pydantic model defined in src/ (typed output shape).
        - `assert <result> == expected_row` where expected_row matches
          a DB row dict (DB output shape).
        - Schema validation via `jsonschema.validate(...)` or
          `SomeModel.model_validate(<result>)`.
      Simple `assert result is not None` or `assert len(result) > 0`
      checks do NOT satisfy this — they verify existence, not shape.
      Flag the repo if no test function contains a shape assertion.

  # ─────────────────────────────────────────────
  # TOOLING
  # ─────────────────────────────────────────────

  - id: TEST-005
    title: pytest as test runner
    status: requirement
    dimension: testing_coverage
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service]
    description: >
      pytest is the test runner for all Python projects. Configured in pyproject.toml.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check for [tool.pytest.ini_options] in pyproject.toml. Flag if repo uses
      unittest directly without pytest.

  - id: TEST-006
    title: pytest-cov for coverage in CI
    status: requirement
    dimension: testing_coverage
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service]
    description: >
      Coverage measured on every CI run. Report in terminal. Threshold not enforced
      by number — enforced by critical path coverage (TEST-001 through TEST-004).
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check CI workflow for pytest --cov or pytest-cov invocation. Flag if coverage
      is not measured in CI.

  - id: TEST-007
    title: respx/httpx for HTTP mocking — no real external calls
    status: requirement
    dimension: testing_coverage
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service]
    description: >
      respx/httpx used for mocking HTTP calls in integration tests. No real external
      calls to Drive, Sheets, or any external API in unit or integration tests.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check pyproject.toml dev dependencies for respx. Search test files for
      any use of requests.get, httpx.get, or similar real HTTP calls outside
      of a respx.mock context. Flag any test file importing httpx or requests
      without a corresponding respx mock. Also flag if respx is absent from
      dev dependencies entirely.

  # ─────────────────────────────────────────────
  # FASTAPI TESTING
  # ─────────────────────────────────────────────

  - id: TEST-008
    title: FastAPI TestClient for API tests
    status: requirement
    dimension: testing_coverage
    severity: WARN
    applies_to: [api-service]
    description: >
      FastAPI's TestClient via httpx used for all API endpoint tests.
      Tests run without a live server.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      For FastAPI services, search test files for 'from fastapi.testclient
      import TestClient' or 'from httpx import AsyncClient'. Flag any test
      function (def test_*) whose body contains a string literal matching
      /v1/ and does not reference a TestClient or AsyncClient fixture.

  - id: TEST-009
    title: Database fixtures — no production data in tests
    status: requirement
    dimension: testing_coverage
    severity: ERROR
    applies_to: [api-service]
    description: >
      Tests use a separate test database or in-memory SQLite with transaction
      rollback. Never run against the production database.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Search conftest.py for database fixture definitions. Require at least one
      of the following patterns in conftest.py: (a) DATABASE_URL override to a
      test-specific URL, (b) in-memory SQLite engine creation, (c) transaction
      rollback fixture with scope='function' or 'session'. Flag if none are
      present in a repo containing SQLAlchemy model definitions. Also flag any
      hardcoded production DATABASE_URL strings in test files.

  - id: TEST-010
    title: Contract test for every API endpoint
    status: requirement
    dimension: testing_coverage
    severity: ERROR
    applies_to: [api-service]
    description: >
      Every API endpoint has a dedicated test asserting the response envelope shape:
      { data, meta } on success, { error: { code, message } } on failure.
      One contract test per endpoint minimum. Contract tests run in CI on every push.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Count FastAPI route decorators. Count test functions asserting response shape.
      Flag if any endpoint has no corresponding contract test, or if contract tests
      are absent from CI workflow.

  - id: TEST-011
    title: Mock verification required
    status: requirement
    dimension: testing_coverage
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service]
    description: >
      Every mock in a test must be verified with assert_called() or assert_called_once().
      Tests that pass because a mock was never called are false positives.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Search all test files for MagicMock, AsyncMock, patch, and mock_object
      usage. For each mock assignment, confirm a corresponding assert_called(),
      assert_called_once(), assert_called_once_with(), or assert_called_with()
      exists in the same test function. Flag test functions that create mocks
      but have no assertion on the mock object.

  - id: TEST-012
    title: mypy must run in CI if [tool.mypy] is declared
    status: requirement
    dimension: cd_readiness
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      If a repo declares [tool.mypy] in pyproject.toml, a CI step invoking
      "uv run mypy src/" (or equivalent) is required. A mypy config that is never
      run in CI gives false assurance and drifts silently.
      Exception: mypy may be omitted during initial setup if repo is in a documented
      "typing: in progress" state. This exception must not persist past first stable release.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check pyproject.toml for [tool.mypy] section. If present, scan
      .github/workflows/ for a step invoking mypy. Flag if no mypy CI step exists
      and repo is not in a documented "typing: in progress" state.
    origin: "api-kaianolevine-com has no mypy CI step. common-python-utils does. Standard aligns them."

  - id: TEST-013
    title: Operational delays sourced from config, not hardcoded
    status: convention
    dimension: testing_coverage
    severity: INFO
    applies_to: [pipeline-cog, api-service, react-app]
    description: >
      Deliberate delays and waits in production code — retry intervals,
      poll sleeps, request timeouts — should be sourced from Settings or
      environment variables rather than hardcoded. This allows them to be
      set to zero or near-zero in test environments without modifying
      source code, keeping test runs fast without changing behavior.
      This is a quality-of-life convention, not a blocking requirement.
      Python: source from Settings or os.getenv(), default to production value.
      TypeScript: source from process.env, default to production value.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Python: search src/**/*.py for hardcoded numeric arguments to
      time.sleep(), retry_delay_seconds=, timeout=, and backoff/tenacity
      wait parameters. Flag any non-zero literal value not read from a
      settings field or os.getenv().
      TypeScript: search src/**/*.ts for hardcoded numeric arguments to
      setTimeout(), setInterval(), and retry/timeout parameters. Flag
      any non-zero literal not sourced from process.env.
      Remediation: move the value to Settings/env var with a sensible
      production default. Tests override via environment.

  - id: TEST-GAP-001
    title: "GAP: Most existing cogs have import-level tests only"
    status: gap
    dimension: testing_coverage
    severity: INFO
    applies_to: [pipeline-cog, api-service]
    description: >
      Most existing cogs currently have import-level tests only. This is a
      known gap with active remediation underway. Per-repo remediation
      sequencing (which cog goes first, priority order) lives in
      BACKLOG.md — not here — so it can be edited without churning the
      standards catalog. When a cog is remediated, this gap entry is
      closed for that cog and it is marked as compliant with TEST-001
      through TEST-004.
    checkable: true
    check_notes: >
      LLM CHECK.
      Apply TEST-001 through TEST-004 to this repo in sequence. This
      rule is the rollup — it fires as INFO when ANY of the four
      critical-path tests (TEST-001 normalization, TEST-002 dedup,
      TEST-003 failure path, TEST-004 output shape) is missing. It is
      LLM-judged because the underlying four rules are LLM-judged (see
      their check_notes). This GAP rule is closed for a cog when all
      four underlying rules pass.
