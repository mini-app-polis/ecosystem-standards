# ecosystem-standards / python.yaml
# Standards for all Python services, cogs, and libraries.

standards:

  # ─────────────────────────────────────────────
  # TOOLING
  # ─────────────────────────────────────────────

  - id: PY-001
    title: uv for dependency management
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      uv replaces Poetry. Faster installs, simpler lockfile, better resolution.
      All new cogs use uv. Existing cogs migrate when touched.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check for uv.lock or [tool.uv] in pyproject.toml. Flag new repos using
      Poetry. Flag existing repos using Poetry only when actively being worked on.

  - id: PY-002
    title: ruff for linting and formatting
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      ruff replaces black + isort + flake8. Single tool, significantly faster.
      Configured in pyproject.toml.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check for [tool.ruff] in pyproject.toml. Flag if repo configures
      black, isort, or flake8 separately.

  - id: PY-003
    title: Python 3.11+ minimum version
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      Minimum version for new work is Python 3.11. Python 3.13 preferred.
      Type hints used throughout.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check requires-python in pyproject.toml. Flag if minimum is below 3.11.

  - id: PY-004
    title: Pydantic for all external data validation
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      All external data (CSV rows, API responses, Drive file metadata) validated
      through Pydantic models before processing. Replaces ad-hoc dict access.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      In each Python source file under src/, check for Pydantic model imports
      (from pydantic import BaseModel). Flag any module that accesses external
      data (CSV parsing, Drive API responses, HTTP responses) using raw dict
      access or positional indexing without a corresponding Pydantic model
      definition in the same repo. Flag any of the following access patterns
      on variables holding external data (CSV rows, API responses, Drive API
      responses): row[0] or row['key'] where row is the result of csv.reader or
      csv.DictReader; response.json() assigned directly to a variable without
      passing through a Pydantic model; positional tuple indexing (data[0],
      data[1]) on parsed external data.

  # ─────────────────────────────────────────────
  # PROJECT STRUCTURE
  # ─────────────────────────────────────────────

  - id: PY-005
    title: src layout required
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      All packages use src/<package_name>/ + tests/<package_name>/. No flat layouts.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check for presence of src/ directory. Flag if Python package files are at
      the repo root (flat layout).

  - id: PY-006
    title: common-python-utils declared as dependency
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      All cogs declare common-python-utils as a dependency. Shared behaviors
      live there, not duplicated per-repo. Flag if cog re-implements logging,
      API clients, or metadata helpers.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check pyproject.toml dependencies for common-python-utils. Flag if absent
      and repo is a Python cog.

  - id: PY-007
    title: pyproject.toml as single source of truth
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      pyproject.toml is the only configuration file. No setup.py, no requirements.txt.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check for presence of setup.py or requirements.txt at repo root. Flag if found.

  - id: PY-008
    title: pre-commit configured
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      ruff and basic hooks configured via .pre-commit-config.yaml. Runs on every commit.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check for .pre-commit-config.yaml at repo root. Flag if absent.

  - id: PY-009
    title: hatchling as build backend
    status: convention
    dimension: structural_conformance
    severity: INFO
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      hatchling is the ecosystem standard build backend for all Python packages.
      Already used by common-python-utils. Requires no [tool.setuptools] config.
      New repos must use hatchling from day one. Existing repos migrate as a chore commit.
    decision: "Decided: hatchling. March 2026. Rationale: already used by shared library, simpler config, modern default."
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check [build-system] requires in pyproject.toml. Flag if value is not hatchling.

  - id: PY-010
    title: ruff line length is 88
    status: convention
    dimension: structural_conformance
    severity: INFO
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      All Python repos set line-length = 88 in [tool.ruff] in pyproject.toml.
      Matches Python community default and Black. Ensures cross-repo consistency.
    decision: "Decided: 88. March 2026. Rationale: Python community default, matches Black, lower cognitive load on diff review."
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Parse [tool.ruff] line-length in pyproject.toml. Flag if value is not 88
      or if field is absent.

  # ─────────────────────────────────────────────
  # NAMING CONVENTIONS
  # ─────────────────────────────────────────────

  - id: PY-011
    title: Naming conventions — Python
    status: convention
    dimension: structural_conformance
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      Package name: snake_case matching repo name (hyphens become underscores).
      Module files: snake_case verb phrases (process_new_files.py).
      Functions: snake_case descriptive verbs (generate_dj_set_collection()).
      Constants: UPPER_SNAKE_CASE in config module.
      Pydantic models: PascalCase nouns (DjSetRecord, TrackRow).
      Log messages: emoji prefix for lifecycle events (🚀 start ✅ success ❌ failure).
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check the package name in pyproject.toml matches the repo name with
      hyphens converted to underscores. Check that the src/ directory name
      matches. Check that all .py filenames under src/ are snake_case.
      Check that Pydantic model class names in source files are PascalCase.
      Flag any module file using CamelCase or kebab-case naming.

      SPLIT IDENTITY CARVE-OUT: Some repos intentionally use different
      distribution names and import package names (e.g. the package is
      published as common-python-utils but imported as mini_app_polis).
      This is a legitimate pattern when DOC-009 is satisfied — both names
      are documented in __init__.py and README.md. Do not flag PY-011 for
      a name mismatch if DOC-009 passes for that repo. Only flag if the
      mismatch is undocumented.

  # ─────────────────────────────────────────────
  # ERROR HANDLING
  # ─────────────────────────────────────────────

  - id: PY-012
    title: FAILED_ prefix for failed inputs
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog]
    description: >
      Files that fail processing are renamed FAILED_<original> in the source folder
      for manual retry. Failed files must not be silently deleted or left unmarked.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Search all Python source files for the string 'FAILED_' in rename or
      move operations (shutil.move, os.rename, Path.rename). If the cog
      processes files and no FAILED_ rename pattern is found, flag as missing.
      Confirm FAILED_ prefix is applied in exception handlers, not just happy
      path code.

  - id: PY-013
    title: Deduplication handling is visible
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog]
    description: >
      A pipeline-cog or trigger-cog that processes potentially-repeating
      input shows explicit handling of duplicate input in its source.
      The specific mechanism is an implementation decision — common
      patterns include file-level renames (e.g. possible_duplicate_
      prefix), row-level uniqueness constraints with skip-on-conflict,
      content-hash dedup, or equivalent. The chosen strategy is
      recorded in docs/decisions/ as an ADR.

      Cogs whose inputs cannot contain duplicates by construction
      (e.g. a pure-compute transform over already-canonicalized input)
      are expected to declare this in evaluator.yaml as an exemption
      with a reason naming why duplicates are impossible.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Search all Python source files under src/ for any case-insensitive
      substring match against dedup-awareness signals:
        - 'dedup'
        - 'duplicate'
        - 'already exists'
        - 'already processed'
        - 'on_conflict'
        - 'on conflict'
        - 'integrityerror'
        - 'unique constraint'
        - 'uniqueviolation'
      If no signal is found, flag the cog — the source does not
      visibly acknowledge duplicate-input handling. The finding
      message names the missing signals and suggests adding explicit
      dedup handling or documenting why duplicates are impossible.

      This check does not verify the correctness of the dedup
      implementation — that is a semantic property beyond
      deterministic checking. The check establishes only that the
      cog has considered duplicates.

  - id: PY-014
    title: finally for temp file cleanup
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog]
    description: >
      Temp files created during processing are always cleaned up in a finally
      block regardless of success or failure.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Search all Python source files for temp file creation patterns (tempfile,
      NamedTemporaryFile, tmp_ prefixed paths). For each occurrence, confirm
      cleanup is performed inside a finally block. Flag any temp file creation
      not covered by a finally or context manager.

  - id: PY-015
    title: SQLAlchemy async pattern required in FastAPI services
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [api-service]
    description: >
      FastAPI services use SQLAlchemy's async engine and session — AsyncEngine,
      async_sessionmaker, AsyncSession, and await session.execute(). Sync
      SQLAlchemy sessions (Session, sessionmaker) must not be used in an async
      FastAPI context. Sync sessions block the event loop and cause connection
      pool exhaustion under load. The asyncpg driver is required alongside
      SQLAlchemy async.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Search Python source files for SQLAlchemy imports. Flag any import of
      Session or sessionmaker from sqlalchemy.orm without the Async prefix.
      Flag any create_engine() call without create_async_engine(). Check
      pyproject.toml dependencies for asyncpg — flag if sqlalchemy is present
      but asyncpg is absent. Flag any session usage without await on execute,
      commit, or refresh calls.

# CFG-* rules moved to standards/config.yaml.
