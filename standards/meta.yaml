# ecosystem-standards / standards/meta.yaml
# Rules governing the structure and operation of this standards
# repository itself. These rules apply exclusively to
# `applies_to: [standards-repo]` — they are the meta-standards that
# keep the standards catalog coherent.

standards:

  - id: META-001
    title: Repo version is managed by semantic-release
    status: requirement
    dimension: cd_readiness
    severity: ERROR
    applies_to: [standards-repo]
    description: >
      The standards repo version of record lives in package.json,
      owned and written by semantic-release on every release. Humans
      do not edit the version field. All consumers (evaluator-cog
      and any future consumer) resolve `standards_version` by reading
      package.json at runtime.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Verify the release pipeline is correctly wired:
        (1) `package.json` exists at repo root with a `version` field.
        (2) `.releaserc.json` exists and includes both
            `@semantic-release/npm` (with `npmPublish: false`) and
            `@semantic-release/git` plugins.
        (3) The `@semantic-release/git` `assets` array includes
            `package.json`.
        (4) `.github/workflows/` contains a workflow that invokes
            `npx semantic-release` on push to main, with
            `@semantic-release/npm` among the installed plugins.
      Flag if any of the four conditions fails.

  - id: META-002
    title: No scattered version or date metadata
    status: requirement
    dimension: standards_currency
    severity: ERROR
    applies_to: [standards-repo]
    description: >
      Version and date metadata lives in exactly one place
      (package.json, managed by semantic-release — see META-001).
      Standards files and the manifest must not carry header
      `# Version:` comments, top-level `updated:` fields, top-level
      `maintainer:` fields, or per-rule `added:` fields. These were
      all human-maintained and historically drifted; the cleanup is
      now enforced.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Scan all YAML and Markdown files in the repo:
        (1) Flag any line matching `^# Version:` in standards/*.yaml,
            index.yaml, ecosystem.yaml, or definitions-of-done.yaml.
        (2) Flag any top-level `updated:` or `maintainer:` field in
            index.yaml or ecosystem.yaml.
        (3) Flag any per-rule `added:` field inside any
            standards/*.yaml file. (Regex: `^\s*added:\s*\d{4}-\d{2}`)
      The README rule-format example must also not contain an
      `added:` field — flag if present.
      CHANGELOG.md is exempt — semantic-release owns its contents.

  - id: META-003
    title: Canonical enums in index.yaml are dictionaries
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [standards-repo]
    description: >
      Canonical value lists in index.yaml (severities, dimensions,
      statuses, repo_types, traits) are declared as dictionaries
      mapping each value to a one-line description. Bare lists are
      not acceptable — they fail to document what each value means
      and force consumers to look elsewhere for the definition.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Load index.yaml and verify that the following top-level or
      nested keys are each `dict` types with non-empty string values:
        - `severities`
        - `dimensions`
        - `statuses`
        - `schema.repo_types`
        - `schema.traits`
      Flag any key that is a `list` type instead of a `dict`.
      Flag any dict whose values are empty strings or None.

  - id: META-004
    title: Canonical field-value enums have CONTEXT CONTRACT blocks
    status: requirement
    dimension: documentation_coverage
    severity: WARN
    applies_to: [standards-repo]
    description: >
      When a field in the pipeline_evaluations data model takes a
      canonical set of string values (severity, source, dimension),
      the authoritative list of values and their semantics must be
      documented in the relevant domain file's CONTEXT CONTRACT
      section. This is how downstream consumers (evaluator-cog,
      cogs, api-kaianolevine-com) know which values are valid.
      Current examples: the `pipeline_evaluations.source` canonical
      values block in standards/evaluation.yaml.
    checkable: true
    check_notes: >
      LLM CHECK.
      Examine standards/evaluation.yaml for the presence of a
      CONTEXT CONTRACT section documenting the canonical values of
      `pipeline_evaluations.source`. The block must enumerate every
      value a production cog or evaluator may emit and describe
      what each value means.

      Steps (1) and (2) are structural — a deterministic sub-check can
      verify presence and per-value description text. Step (3) is the
      LLM-judged part, because it requires cross-referencing usage in
      consumer repos (evaluator-cog, cogs) against the contract block
      in this repo.

      Flag if:
        (1) The CONTEXT CONTRACT block is missing. [deterministic]
        (2) The block lists values but does not describe what each
            means. [deterministic]
        (3) A value appears in evaluator-cog or cog source code that
            is not enumerated in the CONTEXT CONTRACT block. [LLM;
            also detected by evaluator-cog's runtime drift check —
            see EVAL-007].

  - id: META-005
    title: Checkable rules declare DETERMINISTIC or LLM in check_notes
    status: requirement
    dimension: documentation_coverage
    severity: WARN
    applies_to: [standards-repo]
    description: >
      Every rule with `checkable: true` must open its `check_notes` block
      with either `DETERMINISTIC CHECK.` or `LLM CHECK.` on the first line
      of the value. This tells evaluator-cog (and human readers) at a
      glance whether the check runs through the deterministic engine
      (file-presence, regex, AST, CI YAML parsing) or the LLM engine
      (judgment over source code or prose).

      The convention is load-bearing: evaluator-cog routes checks to the
      correct engine based on the prefix, and drift detection between
      the standards catalog and the evaluator's registry (EVAL-007) keys
      off the same classification. A checkable rule without a prefix
      defaults to LLM, which is slower and less reliable than a
      deterministic check that simply forgot to declare itself.

      This prefix is part of the canonical `check_notes` schema — see
      `index.yaml` `schema.rule_fields.check_notes`. META-005 is the
      deterministic enforcement of that schema contract.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Scan every rule across standards/*.yaml. For each rule with
      `checkable: true`:
        (1) Extract the `check_notes` block.
        (2) Trim leading whitespace and newlines.
        (3) Verify the first non-blank line starts with either
            `DETERMINISTIC CHECK.` or `LLM CHECK.` (exact, including
            the trailing period).
      Flag any checkable rule whose `check_notes` does not begin with
      one of the two recognized prefixes. The fix is always a one-line
      prepend — do not rewrite the rest of the check_notes content.

  - id: META-006
    title: Rule ID prefix matches the file's declared rule_prefix
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [standards-repo]
    description: >
      Every rule in `standards/<file>.yaml` must have an ID whose
      prefix appears in that file's `rule_prefix` entry in
      `index.yaml`. The prefix-to-file mapping in `index.yaml`
      `files:` is authoritative — it is how readers navigate the
      catalog, and how this playbook's "pick the right file" step
      resolves. A rule whose prefix disagrees with its file silently
      breaks that navigation.
      Gap rules use the form `<PREFIX>-GAP-NNN` and must still match
      the file's declared prefix.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      For each entry in `index.yaml` `files:`:
        (1) Read the `rule_prefix` value (string or list of strings).
        (2) Open the referenced standards file and iterate every
            rule under `standards:`.
        (3) For each rule `id` of form `PREFIX-NNN` or
            `PREFIX-GAP-NNN`, confirm PREFIX matches one of the
            declared `rule_prefix` values for that file.
        (4) Flag any rule whose prefix does not match.
      The fix is either to move the rule to the correct file or to
      add the prefix to `index.yaml` `files:` if the placement is
      intentional and the file genuinely owns a new prefix.

  - id: META-007
    title: Rule IDs are append-only — retired numbers should not be reused
    status: convention
    dimension: structural_conformance
    severity: WARN
    applies_to: [standards-repo]
    description: >
      When a rule is retired, its entry is deleted from the YAML file
      (git history is the record — see `playbooks/new-standard.md` Step 8).
      The retired ID number should never be reused by a subsequent rule.
      A new rule takes `max(ever-seen ID for this prefix) + 1` as computed
      from git history — not `max(current IDs) + 1`. This keeps
      cross-references (findings in `pipeline_evaluations`, prose in ADRs,
      inline comments in downstream repos) unambiguous across time.
      This is a convention, not a requirement. Full enforcement would
      require walking git history on every PR or evaluator run, which is
      not worth the runtime cost. The primary control is author discipline
      following `playbooks/new-standard.md` Step 4, which provides a
      git-log-based command for finding the next correct ID. CI enforces
      only the lightweight guard: no duplicate IDs within the current
      catalog.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      (1) Collect every rule `id` across all `standards/*.yaml` files.
      (2) Flag any ID string that appears more than once.
      This is the only repurposing case detectable without git history.
      The harder case — an ID deleted in a past commit and reintroduced
      on a later rule — is not enforced. Author discipline per
      `playbooks/new-standard.md` Step 4 is the primary control.
