# ecosystem-standards / principles.yaml
# Immutable core principles that govern intent and philosophy across the ecosystem.
# Stack choices change. These do not.

standards:

  - id: PRIN-001
    title: Reuse over rebuild
    status: convention
    dimension: structural_conformance
    severity: ERROR
    applies_to: [all]
    description: >
      Work in one layer should have a clear path to surfacing in another.
      Cogs feed APIs. APIs feed sites. Shared libraries reduce duplication
      across all layers.
    checkable: false

  - id: PRIN-002
    title: Pipeline resilience — continue on item failure
    status: requirement
    dimension: structural_conformance
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog]
    description: >
      Pipelines continue on per-file errors. One bad input does not abort a run.
      Failures are logged, prefixed, and left for retry — never silently dropped.

      Scoped to pipeline-cog and trigger-cog: the rule describes iteration over
      a batch of items, which is only meaningful for repos that process such
      batches. API services handle one request at a time; static sites and
      react-apps don't iterate inputs; shared libraries and the standards repo
      don't run pipelines.
    checkable: true
    check_notes: >
      LLM CHECK.
      Scan pipeline entry points for bare except/raise that would abort the full
      run on a single item failure. Flag if no per-item try/except wrapping exists.

  - id: PRIN-003
    title: AI evaluates process, not data
    status: convention
    dimension: structural_conformance
    severity: ERROR
    applies_to: [all]
    description: >
      AI is infrastructure, not a feature. It runs during the pipeline to evaluate
      health and conformance — not to enrich output data for end users.
    checkable: false

  - id: PRIN-004
    title: New stack, opportunistic migration
    status: convention
    dimension: structural_conformance
    severity: INFO
    applies_to: [all]
    description: >
      New things are built with the current best stack. Existing things migrate
      when the opportunity arises — not on a forced schedule.
    checkable: false

  - id: PRIN-005
    title: Observability is not optional
    status: requirement
    dimension: cd_readiness
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service]
    description: >
      If you cannot see what a system is doing in production, you cannot deploy
      it confidently. Logging, error tracking, and run history are requirements,
      not enhancements. Every production service must have all three.

      Scoped to production services. Shared libraries are consumed by services
      that own observability at their boundary; static sites and react-apps
      have different observability concerns (client-side error tracking) that
      are covered by the frontend standards, not this rule.
    checkable: true
    check_notes: >
      LLM CHECK.
      Check for Sentry integration, structured logging via common-python-utils
      or common-typescript-utils, and Prefect run history (for pipelines). Flag any
      production service missing any of these three.

  - id: PRIN-006
    title: Deploy anytime, release when ready
    status: convention
    dimension: cd_readiness
    severity: WARN
    applies_to: [all]
    description: >
      Code and features are decoupled. Deployments are safe at any time.
      Feature flags control what users see. A flag should be the first
      tool considered when a feature spans multiple services or when the
      frontend needs to ship before the API is ready. See CD-001 for
      the full feature flag standard.
    checkable: false

  - id: PRIN-007
    title: Portfolio artifacts are working systems
    status: convention
    dimension: structural_conformance
    severity: INFO
    applies_to: [all]
    description: >
      Portfolio pieces are live, queryable, demonstrable systems — not case
      studies, READMEs, or screenshots.
    checkable: false

  - id: PRIN-008
    title: Bug fix commits touch tests
    status: requirement
    dimension: testing_coverage
    severity: ERROR
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      If a bug was found in production, a test is written that would
      have caught it. This rule covers the concrete "did a test file
      change alongside the source change" check. The assessment of
      whether the test is actually a regression test for the specific
      bug lives in PRIN-010.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Fetch recent commits on main with conventional-commit prefix
      `fix:` or `fix(<scope>):`, last 90 days.
      For each fix commit, verify that at least one file matching
      either `tests/**/*.py`, `src/**/test_*.py`, or `**/*.test.ts`
      was added or modified either:
        (a) in the same commit, OR
        (b) in a commit within 24 hours of the fix commit that
            references the same issue number (via "Fixes #N",
            "Closes #N", or similar).
      Flag any fix commit failing both conditions.
      Exempt: fix commits touching only documentation files
      (docs/**/*.md, README.md) or only build config files
      (pyproject.toml, package.json, .github/**).

  - id: PRIN-009
    title: Standards are a living document
    status: requirement
    dimension: standards_currency
    severity: WARN
    applies_to: [standards-repo]
    description: >
      This document is updated as the ecosystem evolves. Outdated standards are
      worse than no standards — they create confusion and erode trust in the process.
      Standards must be reviewed at least every 90 days.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Run against the ecosystem-standards repo only (applies_to is
      scoped there; a global `all` reading would fire on every repo,
      which is wrong — it is this catalog's activity that signals
      currency, not any consumer's).
      (1) Fetch the timestamp of the most recent commit to `main` that
          modifies any file under `standards/**/*.yaml`, `index.yaml`,
          `ecosystem.yaml`, or `definitions-of-done.yaml`. Use
          `git log -1 --format=%cI -- standards/ index.yaml ecosystem.yaml definitions-of-done.yaml`.
          Exclude release-only commits (subject starts with
          `chore(release):`) — they do not represent substantive
          standards work.
      (2) Flag if more than 90 days have elapsed between that
          timestamp and the evaluation run time.

  - id: PRIN-010
    title: Bug fix tests are genuine regression tests
    status: requirement
    dimension: testing_coverage
    severity: WARN
    applies_to: [pipeline-cog, trigger-cog, api-service, shared-library]
    description: >
      Beyond the presence of test changes in a fix commit (PRIN-008),
      the test changes must actually exercise the failure path that
      the bug fix addresses. A fix commit that modifies an existing
      test's assertion to match new behavior — without adding a test
      that would have failed pre-fix — does not satisfy this rule.
    checkable: true
    check_notes: >
      LLM CHECK.
      For each fix commit identified by PRIN-008, examine the test
      changes:
        (1) Flag fix commits where all test changes are modifications
            to existing test assertions (no new test functions added).
            This pattern usually indicates the test was adjusted to
            match the new code rather than written to catch the bug.
        (2) Flag fix commits where the new/modified test touches a
            module unrelated to the module modified by the fix (as
            measured by file paths — if fix changes
            src/cog/processing.py, a new test in
            tests/utils/test_unrelated.py is suspicious).
        (3) For new test functions added in fix commits, assess
            whether the test's assertion describes the buggy behavior
            that was fixed. A test function named `test_valid_input`
            added in a commit fixing a null-handling bug is suspicious
            — the test name suggests happy-path, not the regression
            case.
      This rule is LLM-judged because assessing whether a test
      genuinely exercises a specific failure mode requires reading
      both the fix diff and the test body together.
