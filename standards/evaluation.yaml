# ecosystem-standards / evaluation.yaml
# Standards governing how AI evaluation is performed across the ecosystem.
#
# AI is used to evaluate the development process itself — not to enrich output data.
# The evaluator checks conformance to these standards, surfaces drift, and provides
# actionable feedback.

standards:

  # ─────────────────────────────────────────────
  # PHILOSOPHY
  # ─────────────────────────────────────────────

  - id: EVAL-001
    title: Evaluation findings stored, not ephemeral
    status: convention
    dimension: pipeline_consistency
    severity: WARN
    applies_to: [pipeline-cog, api-service]
    description: >
      Evaluation results are written to the database alongside pipeline outputs.
      They are reviewable, queryable, and feed the portfolio surface. Results
      logged only are not acceptable for production pipelines.
    checkable: false

  - id: EVAL-002
    title: Every evaluation references a standards version
    status: requirement
    dimension: standards_currency
    severity: ERROR
    applies_to: [pipeline-cog, api-service]
    description: >
      Every evaluation call includes a reference to the current version of the
      standards document being evaluated against. Without the rubric, evaluation
      is undefined.

      Canonical implementation: resolve standards_version at runtime by reading
      package.json from the ecosystem-standards repo, cached for the process
      lifetime. Allow an explicit environment variable override
      (STANDARDS_VERSION) for tests and controlled pins. Do not hardcode
      version strings as defaults — they will go stale silently, and presence
      checks alone will not catch the drift.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check pipeline_evaluations table for standards_version field. Flag
      evaluations missing this field.

      Additionally, scan evaluator and cog source files (engine/, flows/,
      src/**/*.py) for hardcoded standards version string literals assigned
      as defaults — e.g. standards_version="3.0.1" or STANDARDS_VERSION = "3.0.1"
      as a module-level constant. Flag any found. Exempt test fixtures and
      values explicitly sourced from environment variables or from a runtime
      read of package.json.

  - id: EVAL-003
    title: Findings are specific and actionable
    status: requirement
    dimension: pipeline_consistency
    severity: WARN
    description: >
      Every finding emitted by evaluator-cog references a specific
      standard by ID, describes what was observed with enough
      specificity to locate the violation, and suggests a concrete
      remediation. Vague findings ("improve error handling," "better
      logging") are not acceptable.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Runtime data-quality check against pipeline_evaluations for
      findings emitted by evaluator-cog in the last 30 days
      (source=conformance_check OR source=standards_drift):
        (1) Every finding_text must contain at least one rule ID
            matching the pattern [A-Z]+-\d+ (e.g. API-001, CD-005,
            PIPE-013). Flag any finding whose text does not reference
            a rule ID.
        (2) finding_text length must be > 60 characters. Findings
            shorter than this baseline almost certainly lack the
            specificity this rule requires.
        (3) Every finding must have a non-null remediation (or
            equivalent column). Flag findings with empty remediation.
        (4) remediation length must exceed finding_text length × 0.5
            OR be ≥ 40 characters. A remediation that is just a copy
            of the finding (or shorter) adds no actionable guidance.
      The check reads the api-kaianolevine-com pipeline_evaluations
      data.

  - id: EVAL-006
    title: Standards currency dimension
    status: requirement
    dimension: standards_currency
    severity: INFO
    applies_to: [pipeline-cog, api-service]
    description: >
      Evaluation dimension: has this repo been evaluated against the current version
      of the standards document? Is it behind? Flag if the last evaluation used a
      standards version more than one minor version behind current.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check pipeline_evaluations for this repo. Compare standards_version on the
      most recent evaluation against current package.json version. Flag if behind.

  - id: EVAL-007
    title: Standards/evaluator check coverage must be tracked and in sync
    status: requirement
    dimension: standards_currency
    severity: ERROR
    description: >
      Every checkable rule in ecosystem-standards (those with
      `checkable: true`) must have a corresponding implementation in
      evaluator-cog's deterministic check engine. Every check in
      evaluator-cog's deterministic engine must map back to a real rule
      in ecosystem-standards.

      The mapping contract is expressed via a `check_id` field on
      checkable rules (this repo) and a corresponding `CHECK_ID` constant
      or decorator on each check implementation in evaluator-cog. Drift
      between the two repos is detected automatically by evaluator-cog
      itself on every evaluation run.

      When drift is detected:
        - Unimplemented checkable rules → severity WARN finding,
          source=conformance_check
        - Orphaned evaluator checks (no backing standard) → severity
          ERROR finding
        - Version skew (evaluator's pinned standards version is more
          than one minor version behind current package.json) →
          severity WARN finding

      Findings are written to pipeline_evaluations via api-kaianolevine-com
      with source=standards_drift, so they appear in the Pipeline Health
      view alongside all other conformance findings.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      This rule is verified at runtime inside evaluator-cog, which already
      fetches the standards catalog on every evaluation. The drift check:
        (1) Parses every `standards/*.yaml` rule from the fetched catalog
            and extracts `checkable: true` rules' IDs.
        (2) Inspects evaluator-cog's own deterministic check registry for
            the `CHECK_ID = "XXX-NNN"` constants (or equivalent decorator
            metadata) that each implementation exposes.
        (3) Computes set differences in both directions:
              - In standards but not in evaluator → unimplemented.
              - In evaluator but not in standards → orphaned.
        (4) Compares the standards repo's current version against the
            `standards_version` pinned by the running evaluator. Version
            skew > 1 minor version triggers a finding.
      Findings are written to api-kaianolevine-com with
      source=standards_drift and appear in Pipeline Health alongside
      all other conformance findings.

  - id: EVAL-008
    title: Every active repo must have an evaluator.yaml at its root
    status: requirement
    dimension: structural_conformance
    severity: WARN
    applies_to: [all]
    description: >
      All active repos in the ecosystem must have an evaluator.yaml file at
      the repo root. This file declares the repo's type, traits, exemptions,
      and deferrals — the per-repo evaluation configuration introduced in
      ADR-001 (federated evaluation) and ADR-002 (type/trait taxonomy).

      Required fields:
        type: one of the repo types defined in index.yaml schema.repo_types

      Optional fields:
        traits: list of trait names from index.yaml schema.traits
        exemptions: list of {rule, reason} objects for rules that genuinely
                    do not apply to this repo
        deferrals: list of {rule, reason, until} objects for known failures
                   not currently prioritized

      Minimum valid evaluator.yaml:
        type: pipeline-cog

      During the migration period (while ecosystem.yaml still carries
      check_exceptions), a missing evaluator.yaml is a WARN not an ERROR.
      Once migration is complete and check_exceptions are stripped from
      ecosystem.yaml, this rule will be promoted to ERROR.
    checkable: true
    check_notes: >
      DETERMINISTIC CHECK.
      Check for evaluator.yaml at the repo root. Flag if absent.
      If present, validate that the type field is present and matches
      one of the valid repo_types in index.yaml. Flag if type is absent
      or unrecognized. Flag if exemptions are present without reason strings.
      Flag if traits contain unrecognized values.

  - id: EVAL-GAP-001
    title: Deterministic conformance checks — partial coverage
    status: gap
    dimension: structural_conformance
    severity: INFO
    applies_to: [pipeline-cog, api-service]
    description: >
      The conformance flow in evaluator-cog implements a subset of
      deterministic checks covering file presence, pyproject.toml, CI YAML,
      AST scanning, and test structure. Of the ~122 checkable rules defined
      across the standards catalog, the majority are not yet covered
      deterministically and fall to LLM assessment only.
      Remediation: backfill deterministic checks one domain at a time,
      starting with delivery.yaml (CD-004 action version pinning) and
      documentation.yaml (DOC-013 README completeness). Tracking of
      implemented vs unimplemented checks is automated via EVAL-007
      drift detection, which runs inside evaluator-cog.
    checkable: false

  # ─────────────────────────────────────────────
  # EVALUATION TRIGGERS
  # ─────────────────────────────────────────────
  # These are not checkable rules — they define when evaluation runs.

  # post-pipeline-run: After any Prefect pipeline completes, evaluate whether
  #   it behaved consistently with past runs and these standards.
  #   Context: run log, step timings, error counts.

  # post-pr-merge: Evaluate diffs for conformance to naming, structure, error
  #   handling, and testing standards.
  #   Context: diff, changed files, PR description.

  # post-deploy: Evaluate whether the deployment followed the CD pipeline.
  #   Context: deploy log, test results, flag states.

  # monthly-review: Ecosystem-wide summary of drift, inconsistencies, and
  #   technical debt. Context: all repos, recent findings, standards version.

  # ─────────────────────────────────────────────
  # CONTEXT CONTRACT
  # Every evaluation call must include:
  #   - standards_version: the version of this standards repo
  #   - artifact: pipeline log, diff, deploy record, or repo snapshot
  #   - dimension(s): the evaluation dimension(s) being assessed
  #   - baseline: historical baseline where relevant (previous run outputs)
  #   - state_tags: current state tags for standards in flux
  # ─────────────────────────────────────────────

  # ─────────────────────────────────────────────
  # PIPELINE_EVALUATIONS.SOURCE — CANONICAL VALUES
  #
  # The `source` field on pipeline_evaluations records where a finding was
  # emitted from. The following five values are canonical. Adding a new
  # source value requires updating this list first.
  #
  # External emission origins (set by the emitting cog, must not be
  # overridden downstream):
  #
  #   flow_inline        Posted from inside a flow body — e.g. the end-of-run
  #                      evaluation task in a pipeline cog. Represents the
  #                      cog's own assessment of its run outcome.
  #
  #   flow_hook          Posted from a Prefect on_failure / on_crashed hook.
  #                      Represents an abnormal-termination finding that the
  #                      inline evaluation step never got to emit.
  #
  #   prefect_webhook    Posted by the evaluator-cog webhook handler on
  #                      Prefect flow run state events. Represents an
  #                      external-observer finding about a flow that did
  #                      not self-report.
  #
  # Evaluator-cog internal sources:
  #
  #   conformance_check  Posted by the scheduled conformance flow in
  #                      evaluator-cog. Represents an assessment of a repo
  #                      against ecosystem-standards.
  #
  #   standards_drift    Posted by the drift-detection job. Represents
  #                      mismatch between ecosystem-standards and the
  #                      checks implemented in evaluator-cog (see EVAL-007).
  #
  # Rule: the `source` value is authoritative at the point of emission.
  # Downstream code (including the evaluator-cog API client) must not
  # override an externally-set source value when forwarding a finding —
  # doing so erases the distinction between flow_inline and flow_hook,
  # which is load-bearing for finding deduplication and for interpreting
  # Pipeline Health UI cards.
  # ─────────────────────────────────────────────
