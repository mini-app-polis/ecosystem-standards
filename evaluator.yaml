# ecosystem-standards / evaluator.yaml
# Per-repo evaluation configuration — ecosystem-standards ADR-001, ADR-002

type: standards-repo

exemptions:
  - rule: DOC-004
    reason: "ecosystem-standards is a YAML catalog consumed by evaluator-cog as data, not a runtime service. It has no deployment, no server process, and no environment variables. DOC-004's requirement for .env.example presumes a service that reads env vars at runtime, which does not apply to a pure catalog repo."
