# ecosystem-standards / index.yaml
# Manifest file — agents fetch this first to discover available standards files.
#
# Fetch pattern:
#   1. GET index.yaml  → discover files and current version
#   2. GET standards/<file>.yaml  → fetch relevant domain(s)
#   3. Pin standards_version in evaluation output for auditability
#

# Dimensions used across all standards files.
# These map directly to the pipeline_evaluations table dimension field.
# Every rule declares exactly one dimension — the category of concern
# the rule addresses. Dimensions are how evaluation findings are
# aggregated in Pipeline Health views.
dimensions:
  structural_conformance: "Does the repo follow documented patterns? Covers src layout, naming conventions, error handling, tooling choices, framework selection."
  pipeline_consistency: "Did this run behave the same way as previous runs? Covers unexpected timing changes, new error types, missing steps, drift in output shape."
  pipeline_reliability: "Will this pipeline run correctly under concurrent or repeated invocation? Covers idempotency, concurrency control, retry behavior, and data-integrity guards."
  testing_coverage: "Are the critical paths covered by tests appropriate to the layer? Unit for pure logic, integration for external dependencies, contract for cross-service shapes."
  documentation_coverage: "Is the repo understandable by a future maintainer (human or AI) without reading every file? Covers README completeness, inline docs, ADRs, and .env.example."
  cd_readiness: "Is the repo safe to deploy continuously? Covers Sentry, structured logging, semantic-release, feature flags, and observability connections."
  cross_repo_coherence: "Do similar concepts look similar across repos? Covers naming conventions, response shapes, shared library usage, and API versioning."
  standards_currency: "Is this repo being evaluated against the current version of the standards? Covers version resolution, staleness detection, and standards/evaluator drift."
  monorepo_coherence: "Do pnpm monorepo workspaces satisfy per-app and root-level rules? Covers workspace_deps, monorepo_path scoping, root CI, and deduplicated findings across sibling apps."

# Severities used across all standards files.
# These map directly to the pipeline_evaluations table severity field.
#
# Rule-level usage: standards rules declare `severity:` as ERROR, WARN, or INFO.
# These represent the severity of the violation if the rule is broken.
#
# Emission-level usage: evaluators may additionally emit CRITICAL (for system-level
# failures that block further evaluation) or SUCCESS (for clean-run completion
# findings from pipeline cogs). These are outcome severities, not rule severities —
# they do not appear on rule definitions in this repo.
severities:
  CRITICAL: "System-level failure blocking further evaluation (e.g. flow crash, evaluator outage). Emission-only — not used on rule definitions."
  ERROR: "PRINCIPLE or PATTERN violated. Requires remediation before next deploy."
  WARN: "Current-state pattern in new code, or TARGET state not being progressed toward. Remediation recommended."
  INFO: "Observation worth noting. No action required but useful for monthly review."
  SUCCESS: "Clean-run completion finding emitted by pipeline cogs. Emission-only — not used on rule definitions."

# Statuses used across all standards files.
# `status` controls how the evaluator treats findings for the rule.
statuses:
  requirement:
    description: >
      Must-comply. The evaluator runs the check (if `checkable: true`)
      and emits findings at the rule's declared severity on violation.
      Findings are surfaced in Pipeline Health as active.
  convention:
    description: >
      Should-comply. The evaluator runs the check (if `checkable:
      true`) and emits findings at the rule's declared severity on
      violation. Findings are surfaced in Pipeline Health as active,
      distinguished from requirements only by the rule's own `status`
      field on the finding record. A repo may deviate from a
      convention by declaring an `exemption` in its `evaluator.yaml`
      with a reason.
  gap:
    description: >
      Known deficiency. The rule is tracked but the check is not yet
      implemented or not yet reliable. The evaluator emits an INFO
      finding on every run noting the gap. `checkable` may be `true`
      (partial check shipped, imperfect) or `false` (no check yet).
      Gap rules are the roadmap — promote to `requirement` when the
      check is ready.

schema:
  rule_fields:
    id:
      required: true
      type: string
      description: >
        Stable identifier of the form `PREFIX-NNN` (e.g. `CD-004`,
        `PY-011`). Gap rules use `PREFIX-GAP-NNN`. The prefix must
        match one of the `rule_prefix` values declared for the rule's
        file in `index.yaml` `files:` (enforced by META-006). IDs are
        append-only — a retired ID is not reused (META-007).
        The `id` is also the canonical check identifier used by
        evaluator-cog's check registry. Implementations register
        their deterministic checks under this same string — there is
        no separate `check_id` field.

    title:
      required: true
      type: string
      description: >
        One-line human-readable rule title. Appears in Pipeline Health
        finding cards and in the rule catalog.

    status:
      required: true
      type: string
      allowed_values: [requirement, convention, gap]
      description: >
        Governs how the evaluator treats violations. See the top-level
        `statuses:` block for per-status evaluator behavior.

    dimension:
      required: true
      type: string
      description: >
        Single dimension from the top-level `dimensions:` block. Used
        to aggregate findings in Pipeline Health. Every rule declares
        exactly one dimension.

    severity:
      required: true
      type: string
      allowed_values: [ERROR, WARN, INFO]
      description: >
        Rule-level severity. Applied to findings when the rule is
        violated. `CRITICAL` and `SUCCESS` are emission-only severities
        and never appear on rule definitions — see the top-level
        `severities:` block.

    applies_to:
      required: false
      type: list of strings
      description: >
        List of repo type names the conformance scanner runs this rule
        against. The scanner clones each repo whose type appears in
        this list and executes the rule's check against its source.
        Use `[all]` to scan every member of `schema.repo_types`; new
        types added to `repo_types` later are automatically included.
        Valid type values are defined in `repo_types` below.

        Omit `applies_to` for rules that are not repo-source checks —
        rules whose check reads the `pipeline_evaluations` table, the
        evaluator's own check registry, or any other non-per-repo
        source. For those rules, `check_notes` is authoritative for
        what the check reads. Current rules omitting `applies_to`:
        EVAL-003 (reads pipeline_evaluations for finding quality),
        MONO-003 (reads pipeline_evaluations for monorepo dedup),
        EVAL-007 (reads the standards catalog and evaluator-cog's
        check registry for drift).

    modifies:
      required: false
      type: list of strings
      description: >
        Rule IDs whose evaluation behavior is altered when this rule
        applies. Used for meta-rules (e.g. monorepo rules that change
        how sibling source-scan rules are run). The altering logic
        lives in this rule's `check_notes`; `modifies:` is a
        structural pointer the evaluator uses to resolve rule
        precedence. When a rule in `modifies:` would fire, the
        evaluator first consults the modifier's check to determine
        the correct behavior.

    description:
      required: true
      type: string
      description: >
        Human-readable explanation of what the rule requires and why.
        Intended for rule authors, reviewers, and anyone investigating
        a finding. Not consumed by the evaluator for dispatch — only
        `check_notes` is.

    checkable:
      required: true
      type: boolean
      description: >
        Whether the evaluator runs an automated check for this rule.
        When `true`, `check_notes` must be present and must begin with
        `DETERMINISTIC CHECK.` or `LLM CHECK.` on its first non-blank
        line (enforced by META-005). When `false`, `check_notes` is
        absent — the rule documents intent only and is not enforced
        by automation.

    check_notes:
      required: when checkable is true
      type: string
      description: >
        Evaluator-facing check specification. The first non-blank line
        is one of:
          - `DETERMINISTIC CHECK.` — evaluator routes to the
            deterministic engine (file presence, regex, AST, YAML/TOML
            parse, version compare).
          - `LLM CHECK.` — evaluator routes to the LLM engine
            (judgment over prose, semantic cross-reference, intent).
        Rules that mix both kinds begin with `LLM CHECK.` and tag
        numbered steps with `[deterministic]` or `[LLM]` inline. See
        META-004 and META-005.

        `check_notes` is the sole source of dispatch for rules that
        omit `applies_to`. Such rules describe their read source in
        `check_notes` directly (e.g. "Runtime data-quality check
        against pipeline_evaluations for...").

    origin:
      required: false
      type: string
      description: >
        Historical annotation explaining the concrete context that
        motivated the rule. Preserved for provenance. Not consumed by
        the evaluator. Optional; omit for rules without noteworthy
        history. Retained rather than relocated to the ADR so that
        single-rule context stays next to the rule.

    decision:
      required: false
      type: string
      description: >
        Brief inline decision record for rules that codify a specific
        technical choice (e.g. "Decided: hatchling. March 2026.
        Rationale: ..."). Preferred over an ADR when the rationale is
        a one-liner and belongs visibly next to the rule. Not consumed
        by the evaluator.

    supersedes:
      required: false
      type: string
      description: >
        Free-form description of what this rule replaces. Used when a
        new rule obsoletes a prior pattern or retired mechanism.
        Preserved for provenance. Not consumed by the evaluator.

  # The `applies_to` value `[all]` expands to every key of
  # `repo_types` below, including keys added in future. Rules that
  # genuinely apply to every repo type should use `[all]` rather
  # than enumerating types — this keeps them correct as the type
  # taxonomy grows.
  repo_types:
    pipeline-cog: >
      Always-on Railway worker running one or more Prefect @flow(s).
      Processes data. Examples: deejay-cog, evaluator-cog, notes-ingest-cog.
    trigger-cog: >
      Always-on Railway worker running a plain asyncio loop. Detects
      events and fires Prefect flow runs via API. No @flow decorator.
      Examples: watcher-cog.
    api-service: >
      HTTP API service with routes, auth, and a database. FastAPI (Python)
      or Hono (TypeScript). Examples: api-kaianolevine-com, deejaytools-com-api.
    shared-library: >
      Published package consumed by other repos. No service entry point,
      no server runtime. Examples: common-python-utils, common-typescript-utils.
    static-site: >
      Astro or HTML site deployed to Cloudflare Pages. No server-side
      runtime. Examples: website-astro-software, website-astro-wcs.
    react-app: >
      Vite/React SPA. Client-side only. May live inside a monorepo.
      Examples: deejaytools-com-app.
    standards-repo: >
      YAML-only definition and tooling repository. Not a deployed service.
      Examples: ecosystem-standards.

  # Trait definitions. Each trait has a human-readable `description`
  # and optionally carries structured exemption data:
  #   - `exempts:` list of rule IDs the trait unconditionally exempts.
  #     The evaluator skips the listed checks for any repo carrying
  #     this trait and records an INFO finding citing the trait.
  #   - `downgrades:` list of {rule, to, reason} objects. The
  #     evaluator still runs the check, but any finding is emitted at
  #     the listed severity rather than the rule's declared severity.
  #     Used for known false-positives (source-scanner limitations)
  #     rather than true semantic exemptions.
  # A repo declares traits in its `evaluator.yaml` under `traits:`.
  traits:
    logger-primitive:
      description: >
        This repo IS the shared library implementation — rules that
        require the repo to declare or use the shared library as a
        dependency cannot apply to the library itself. Applies to
        common-python-utils and common-typescript-utils (the shared
        libraries themselves) and to logger wrapper modules within
        services. CD-009 is exempted for logger wrapper modules;
        XSTACK-001 is exempted for the shared libraries themselves
        (circular dependency — the repo cannot declare itself as a
        dependency).
      exempts: [CD-009, XSTACK-001]

    cloudflare-pages:
      description: >
        Deployed via Cloudflare Pages Git integration (auto-deploy on
        push to main). No ci.yml required — Cloudflare Pages is the
        CI/CD pipeline.
      exempts: [VER-003, VER-005, VER-006]

    multi-flow:
      description: >
        Runs multiple Prefect flows registered via separate entry
        points. The CD-015 source scanner may not resolve
        prefect.serve() in this configuration.
      downgrades:
        - rule: CD-015
          to: INFO
          reason: >
            Source scanner false-positive. The multi-flow pattern is
            correct; the scanner's resolution is incomplete.

    pipeline-cog-evaluator:
      description: >
        This repo IS evaluator-cog — the PIPE-011 evaluation step
        requirement cannot apply to the evaluator itself.
      exempts: [PIPE-011]

  # Dispatch — how the evaluator resolves whether and how to run
  # a given rule against a given repo. The precedence is:
  #
  #   1. Scope — if the rule has `applies_to` and the repo's type is
  #      not in the list, the rule is not run for this repo. No
  #      finding emitted. Rules without `applies_to` bypass this
  #      check; their `check_notes` defines their own read source.
  #
  #   2. Trait exemption — if the repo declares a trait in its
  #      `evaluator.yaml` `traits:` list, and that trait's `exempts:`
  #      includes this rule, the rule is not run. An INFO finding
  #      naming the trait is recorded for auditability.
  #
  #   3. Per-repo exemption — if the repo's `evaluator.yaml`
  #      `exemptions:` lists this rule with a reason, the rule is not
  #      run. An INFO finding naming the reason is recorded.
  #
  #   4. Per-repo deferral — if the repo's `evaluator.yaml`
  #      `deferrals:` lists this rule, the check IS run. If failing,
  #      the finding is emitted at INFO severity with status=deferred
  #      regardless of the rule's declared severity. Deferred findings
  #      are excluded from error/warn counts but remain visible in a
  #      dedicated Deferred section of Pipeline Health.
  #
  #   5. Trait downgrade — if the repo declares a trait whose
  #      `downgrades:` includes this rule, the check IS run and any
  #      finding is emitted at the downgraded severity named in the
  #      trait. Used for known false-positives, not semantic
  #      exemptions.
  #
  #   6. Per-repo downgrade — if the repo's `evaluator.yaml`
  #      `downgrades:` lists this rule, the check IS run and any
  #      finding is emitted at the downgraded severity with the
  #      documented reason. Used for repo-specific checker
  #      limitations not covered by a shared trait.
  #
  #   7. Modifier — if another rule's `modifies:` includes this rule
  #      AND the modifier's `applies_to` matches the repo, the
  #      modifier's `check_notes` is consulted first to determine
  #      altered evaluation behavior. The modifier and the original
  #      rule both run; the modifier's logic may suppress duplicate
  #      or per-app findings.
  #
  #   8. Default — the rule is run against the repo and findings are
  #      emitted at the rule's declared severity.
  #
  # The mechanisms are additive at authoring time (a repo may declare
  # traits and exemptions and deferrals simultaneously) but are
  # resolved in the order above per rule. A rule exempted by trait
  # (step 2) short-circuits — no per-repo exemption or deferral is
  # consulted for that rule.
  dispatch:
    precedence:
      - scope
      - trait_exemption
      - repo_exemption
      - repo_deferral
      - trait_downgrade
      - repo_downgrade
      - rule_modifier
      - default

  evaluator_yaml:
    purpose: >
      Per-repo configuration file (evaluator.yaml at repo root) that declares
      the repo type, traits, exemptions, and deferrals. Required on all active
      repos (EVAL-008). The evaluator reads this file after cloning the repo
      to determine which rules apply and how findings should be surfaced.
    type:
      format: "string — one of the repo_types values above"
      required: true
    traits:
      format: "list of trait names from the traits section above"
      required: false
    exemptions:
      format: "list of {rule: RULE-ID, reason: string} objects"
      purpose: >
        Rules that genuinely do not apply to this repo for structural reasons
        unique to this repo. The evaluator skips the check and surfaces the
        reason in findings as INFO. Exemptions require a reason string.
        If multiple repos share the same exemption reason, that reason should
        be promoted to a type or trait rather than repeated per repo.
    deferrals:
      format: "list of {rule: RULE-ID, reason: string, until: date|null} objects"
      purpose: >
        Rules that apply to this repo and are currently failing, but are not
        prioritized for immediate remediation. The evaluator still runs the
        check — if failing, the finding is written to pipeline_evaluations
        with status: deferred and severity downgraded to INFO. Deferred
        findings are excluded from error/warn counts in pipeline health summary
        but remain visible in a dedicated Deferred section.
        until is optional — null means open-ended. If set to a date that has
        passed, the deferral expires and the finding resurfaces at full severity.
        A deferral without a plan is a signal to reconsider whether the rule
        applies at all (convert to exemption) or whether the fix is overdue.
        Do NOT defer security or data integrity issues.
    downgrades:
      format: "list of {rule: RULE-ID, to: SEVERITY, reason: string} objects"
      purpose: >
        Rules where the check fires incorrectly on this specific repo
        for a known, documented reason — typically a scanner limitation
        the evaluator cannot distinguish from a real violation. The
        evaluator still runs the check; if it fires, the finding is
        emitted at the listed severity instead of the rule's declared
        severity. `to` must be one of ERROR, WARN, INFO. A reason is
        required and should name the specific checker limitation or
        semantic nuance the evaluator misses.
        Use sparingly. If two or more repos share the same downgrade
        reason, promote it to a trait `downgrades:` entry in
        `schema.traits`. Per-repo downgrades are for genuinely one-off
        checker limitations, not a general-purpose severity knob.
        Distinct from `deferrals:` (which is "we know we're failing
        and will fix eventually") — a downgrade says the rule itself
        is misfiring against this repo's actual behavior.

  service_fields:
    dod_type: >
      The definitions-of-done checklist type that applies to this service.
      Must match a key in definitions-of-done.yaml. Null for libraries and
      standards repos. Retained for backward compatibility with existing
      evaluator-cog versions during the v3.0.0 migration period.

  monorepo_fields:
    monorepo: >
      ID of the monorepo this service belongs to. Must match an entry in the
      top-level `monorepos:` section of ecosystem.yaml. When present, the
      evaluator clones the full monorepo repo rather than a standalone repo,
      evaluates the service at `monorepo_path`, and passes workspace-level
      context to Claude. XSTACK-001 is checked at the workspace root
      (workspace_deps) rather than per-app package.json.
    monorepo_path: >
      Relative path from the monorepo root to this service's directory
      (e.g. apps/api). Used by evaluator-cog to scope file reads and
      deterministic checks to the correct subdirectory.
  ecosystem_sections:
    monorepos: >
      Top-level section in ecosystem.yaml listing all monorepos. Each entry
      defines the workspace package manager, apps (with service_id and path),
      workspace_deps (checked at root to satisfy XSTACK-001), and evaluator
      strategy (per_app with workspace_context). Service entries in the
      `services:` list reference their monorepo via `monorepo: <id>` and
      `monorepo_path: <path>`.

# Standards files — one per domain.
# Agents may fetch all files or only the domains relevant to the artifact being evaluated.
files:
  - file: standards/principles.yaml
    domain: principles
    description: Immutable core principles governing intent and philosophy across the ecosystem.
    rule_prefix: PRIN

  - file: standards/python.yaml
    domain: python
    description: Standards for all Python services, cogs, and libraries. Tooling, structure, naming, and error handling.
    rule_prefix: PY

  - file: standards/config.yaml
    domain: config
    description: Application configuration standards — pydantic-settings Settings classes and .env.example contracts.
    rule_prefix: CFG

  - file: standards/testing.yaml
    domain: testing
    description: Testing standards for Python cogs and FastAPI services. Critical path coverage, tooling, and FastAPI-specific patterns.
    rule_prefix: TEST

  - file: standards/documentation.yaml
    domain: documentation
    description: Documentation standards for repos, code, APIs, and the standards document itself.
    rule_prefix: DOC

  - file: standards/api.yaml
    domain: api
    description: Standards for all API services — FastAPI (Python) and Hono (TypeScript). Structure, versioned routes, response envelopes, CORS, migrations.
    rule_prefix: API

  - file: standards/auth.yaml
    domain: auth
    description: Authentication standards for API services — Clerk verification posture, per-service invariants, and client-API parity.
    rule_prefix: AUTH

  - file: standards/pipeline.yaml
    domain: pipeline
    description: Pipeline design and orchestration standards. Prefect patterns, idempotency, and data safety rules.
    rule_prefix: PIPE

  - file: standards/frontend.yaml
    domain: frontend
    description: Frontend standards for static sites (Astro) and web applications (Vite + React).
    rule_prefix: FE

  - file: standards/delivery.yaml
    domain: delivery
    description: Continuous delivery and observability standards. Sentry, structured logging, Prefect Cloud, Healthchecks, Doppler, GitHub Actions patterns.
    rule_prefix: CD

  - file: standards/versioning.yaml
    domain: versioning
    description: Versioning standards — Conventional Commits, semantic-release plumbing, CHANGELOG and version-file ownership, BREAKING CHANGE footers.
    rule_prefix: VER

  - file: standards/meta.yaml
    domain: meta
    description: Rules governing the structure and operation of the standards repo itself. Scoped exclusively to standards-repo.
    rule_prefix: META

  - file: standards/evaluation.yaml
    domain: evaluation
    description: Standards governing how AI evaluation is performed. Evaluation triggers, context contract, and finding requirements.
    rule_prefix: EVAL

  - file: definitions-of-done.yaml
    domain: definitions-of-done
    description: Checklists used by AI evaluators for post-PR assessment. One checklist per artifact type — cog, FastAPI service, pipeline, frontend site, React app, Hono service.

  - file: ecosystem.yaml
    domain: ecosystem
    description: >
      Authoritative inventory of all active, transitioning, and retired
      services, libraries, canonical patterns, and ecosystem terminology.
      Updated on every rename, retirement, new service addition, or
      terminology change.

  - file: standards/monorepo.yaml
    domain: monorepo
    description: >
      Standards for monorepo structure, workspace dependency management,
      and per-app evaluation rules. Applies to pnpm workspaces containing
      multiple evaluatable services.
    rule_prefix: MONO

  - file: standards/cross-stack.yaml
    domain: cross-stack
    description: Standards that apply across both Python and TypeScript stacks. Shared library usage and response shape parity.
    rule_prefix: XSTACK
