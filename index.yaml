      api-kaianolevine-com (retired). Architecture: PIPE-008 rewritten —
      watcher-cog replaces Apps Script → repository_dispatch as canonical
      Drive trigger. CD-006 updated: GitHub Actions is CI/CD only, not a
      trigger relay. CD-004 updated: actions/checkout and actions/setup-node
      pinned to v6. Observability: CD-002 expanded to all production service
      types. CD-003 expanded with structured log event shape and four
      categories (infra, pipeline, data, api). Added CD-007
      (Healthchecks.io for worker services), CD-008 (log level contract),
      CD-009 (structured log event shape), CD-010 (three-layer observability
      stack). New DoD checklist: new_worker_service. Updated
      new_python_processor and new_pipeline DoD checklists with Sentry and
      structured logging requirements. New file: ecosystem.yaml — service
      inventory and canonical pattern registry.

  - version: 1.2.0
    date: 2026-03
