        reason: shared library — three-layer observability does not apply
      - rule: TEST-001
        reason: library — normalization tests not applicable
      - rule: TEST-002
        reason: library — deduplication tests not applicable
      - rule: TEST-004
        reason: library — output shape tests not applicable
      - rule: PY-011
        reason: >
          Intentional split package identity: distribution name is
          common-python-utils, import package is mini_app_polis. This
          predates PY-011 and is a deliberate branding decision — the
          mini_app_polis namespace is stable and used across all consumers.
          Renaming the import package is a breaking change deferred
          indefinitely.
    replaces: kaiano-common-utils
    added: 2026-03

