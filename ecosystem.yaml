# ecosystem-standards / ecosystem.yaml
# Authoritative inventory of all services, libraries, and canonical patterns
# in the MiniAppPolis ecosystem. Updated whenever a service is added, renamed,
# archived, or changes role.
#
# This file is the single source of truth for service names. Standards rules
# reference concepts documented here rather than hardcoding service names.
# When a rename or retirement happens, update this file first — then the
# standards files will reference it correctly.
#
# Version: 1.0.0 · 2026-03

version: 1.0.0
updated: 2026-03
maintainer: mini-app-polis

services:

  # ── Always-on workers (cogs) ──────────────────────────────────

  - id: watcher-cog
    type: worker
    status: active
    language: python
    cog_subtype: trigger
    host: railway
    description: >
      Config-driven Google Drive folder watcher. Polls Drive API on a
      1-minute interval, fires Prefect flow runs when new files are detected.
    check_exceptions:
      - TEST-001  # trigger cog — no data normalization
      - TEST-002  # trigger cog — no deduplication
      - TEST-004  # trigger cog — no data output shape
    replaces: google-app-script-trigger
    added: 2026-03

  - id: deejay-cog
    type: worker
    status: active
    language: python
    cog_subtype: pipeline
    host: railway
    description: >
      DJ set CSV processor. Normalizes, validates, and ingests DJ set data
      into PostgreSQL via api-kaianolevine-com.
    replaces: deejay-set-processor-dev
    added: 2026-03

  - id: evaluator-cog
    type: worker
    status: active
    language: python
    cog_subtype: pipeline
    host: railway
    description: >
      Multi-mode AI evaluation cog. Runs post-pipeline behavioral evaluation
      (pipeline_eval flow) and daily structural conformance checking against
      ecosystem standards (conformance flow). Fetches live ecosystem inventory
      and standards rules at runtime. All findings written to
      pipeline_evaluations table via api-kaianolevine-com with source field
      distinguishing evaluation type.
    check_exceptions:
      - TEST-001  # evaluation cog — no normalization of external data
      - TEST-002  # evaluation cog — no deduplication of external data
      - TEST-004  # evaluation cog — output shape tested via LLM parsing tests
    added: 2026-03


  - id: notes-ingest-cog
      type: worker
      status: active
      language: python
      cog_subtype: pipeline
      host: railway
      description: >
        WCS lesson transcript ingestion pipeline. Triggered by watcher-cog when
        new transcript files land in the configured Google Drive input folder.
        Reads transcripts, calls LLM to produce structured notes JSON, stores
        raw transcripts and notes in Postgres via api-kaianolevine-com, and
        archives processed files. Outputs to wcs_transcripts and wcs_notes
        tables. Consumed by wcs.kaianolevine.com.
      added: 2026-04

  # ── API services ──────────────────────────────────────────────

  - id: api-kaianolevine-com
    type: api
    status: active
    language: python
    framework: fastapi
    host: railway
    description: >
      Primary ecosystem API. DJ sets, tracks, catalog, evaluations, feature
      flags, contact form, resume endpoints. Sole API for the kaianolevine.com
      ecosystem.
    replaces: deejay-marvel-api
    added: 2026-03

  # ── Shared libraries ──────────────────────────────────────────

  - id: common-python-utils
    type: library
    status: active
    language: python
    description: >
      Shared Python utilities. Google API client (Drive, Sheets), LLM client
      (Anthropic, OpenAI), structured logging, API client, metadata helpers.
      All Python processors and cogs declare this as a dependency.
    check_exceptions:
      - PY-006  # this repo IS common-python-utils — cannot depend on itself
      - CD-002  # shared library, no service entry point for Sentry initialisation
      - CD-010  # shared library, three-layer observability does not apply
      - TEST-001  # library, not a pipeline cog — normalization tests not applicable
      - TEST-002  # library, not a pipeline cog — deduplication tests not applicable
      - TEST-004  # library, not a pipeline cog — output shape tests not applicable
    replaces: kaiano-common-utils
    added: 2026-03

  - id: kaiano-ts-utils
    type: library
    status: active
    language: typescript
    repo: deejaytools-com
    check_exceptions:
      - DOC-013   # Python-specific README commands — TypeScript library
    description: >
      Shared TypeScript utilities. Clerk auth middleware (verifyClerkToken),
      response envelope helpers (success, successList, error, CommonErrors),
      structured logger (createLogger) emitting standard log shape, and shared
      Zod schemas. Lives in packages/ts-utils inside the deejaytools-com
      monorepo until stable, then extracts to its own repo.
    check_exceptions:
      - PY-005  # TypeScript — no src/ layout requirement
      - PY-006  # TypeScript — no common-python-utils dependency
      - PY-007  # TypeScript — no pyproject.toml
      - PY-008  # TypeScript — no pre-commit with ruff hooks
      - CD-002  # TypeScript — sentry-sdk is Python specific
      - TEST-005  # TypeScript — no pytest config
      - TEST-006  # TypeScript — pytest coverage not applicable
      - TEST-001  # library — normalization tests not applicable
      - TEST-002  # library — deduplication tests not applicable
      - TEST-004  # library — output shape tests not applicable
    added: 2026-03

