# ecosystem-standards / ecosystem.yaml
# Authoritative inventory of all services, libraries, and canonical patterns
# in the MiniAppPolis ecosystem. Updated whenever a service is added, renamed,
# archived, or changes role.
#
# This file is the single source of truth for service names. Standards rules
# reference concepts documented here rather than hardcoding service names.
# When a rename or retirement happens, update this file first — then the
# standards files will reference it correctly.
#
# Version: 1.0.0 · 2026-03

version: 1.0.0
updated: 2026-04
maintainer: mini-app-polis

services:

  # ── Always-on workers (cogs) ──────────────────────────────────

  - id: watcher-cog
    type: worker
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: trigger
    host: railway
    description: >
      Config-driven Google Drive folder watcher. Polls Drive API on a
      1-minute interval, fires Prefect flow runs when new files are detected.
    check_exceptions:
      - rule: TEST-001
        reason: trigger cog — no data normalization step
      - rule: TEST-002
        reason: trigger cog — no deduplication step
      - rule: TEST-004
        reason: trigger cog — no data output shape to verify
    replaces: google-app-script-trigger
    added: 2026-03

  - id: deejay-cog
    type: worker
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: pipeline
    host: railway
    description: >
      DJ set CSV processor. Normalizes, validates, and ingests DJ set data
      into PostgreSQL via api-kaianolevine-com.
    replaces: deejay-set-processor-dev
    added: 2026-03

  - id: evaluator-cog
    type: worker
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: pipeline
    host: railway
    description: >
      Multi-mode AI evaluation cog. Runs post-pipeline behavioral evaluation
      (pipeline_eval flow) and daily structural conformance checking against
      ecosystem standards (conformance flow). Fetches live ecosystem inventory
      and standards rules at runtime. All findings written to
      pipeline_evaluations table via api-kaianolevine-com with source field
      distinguishing evaluation type.
    check_exceptions:
      - rule: TEST-001
        reason: evaluation cog — no normalization of external data
      - rule: TEST-002
        reason: evaluation cog — no deduplication of external data
      - rule: TEST-004
        reason: evaluation cog — output shape tested via LLM parsing tests
    added: 2026-03


  - id: notes-ingest-cog
    type: worker
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: pipeline
    host: railway
    description: >
      WCS lesson transcript ingestion pipeline. Triggered by watcher-cog when
      new transcript files land in the configured Google Drive input folder.
      Reads transcripts, calls LLM to produce structured notes JSON, stores
      raw transcripts and notes in Postgres via api-kaianolevine-com, and
      archives processed files. Outputs to wcs_transcripts and wcs_notes
      tables. Consumed by wcs.kaianolevine.com.
    check_exceptions:
      - rule: TEST-001
        reason: pipeline cog — no normalization of raw transcript data
      - rule: TEST-002
        reason: pipeline cog — no deduplication of transcript data
      - rule: TEST-004
        reason: pipeline cog — output shape tested via LLM parsing tests
    added: 2026-04

  # ── API services ──────────────────────────────────────────────

  - id: api-kaianolevine-com
    type: api
    status: active
    dod_type: new_fastapi_service
    language: python
    framework: fastapi
    host: railway
    description: >
      Primary ecosystem API. DJ sets, tracks, catalog, evaluations, feature
      flags, contact form, resume endpoints. Sole API for the kaianolevine.com
      ecosystem.
    replaces: deejay-marvel-api
    added: 2026-03

  # ── Shared libraries ──────────────────────────────────────────

  - id: common-python-utils
    type: library
    status: active
    dod_type: null
    language: python
    description: >
      Shared Python utilities. Google API client (Drive, Sheets), LLM client
      (Anthropic, OpenAI), structured logging, API client, metadata helpers.
      All Python processors and cogs declare this as a dependency.
    check_exceptions:
      - rule: PY-006
        reason: this repo IS common-python-utils — cannot depend on itself
      - rule: CD-002
        reason: shared library — no service entry point for Sentry initialisation
      - rule: CD-010
        reason: shared library — three-layer observability does not apply
      - rule: TEST-001
        reason: library — normalization tests not applicable
      - rule: TEST-002
        reason: library — deduplication tests not applicable
      - rule: TEST-004
        reason: library — output shape tests not applicable
    replaces: kaiano-common-utils
    added: 2026-03

  - id: kaiano-ts-utils
    type: library
    status: retired
    language: typescript
    added: 2026-03
    retired_date: 2026-04
    replaced_by: common-typescript-utils
    description: >
      Former shared TypeScript utilities library. Lived in packages/ts-utils
      inside the deejaytools-com monorepo. Extracted and renamed to
      common-typescript-utils in April 2026.

  - id: common-typescript-utils
    type: library
    status: active
    dod_type: null
    language: typescript
    repo: common-typescript-utils
    description: >
      Shared TypeScript utilities. Clerk auth middleware (verifyClerkToken),
      response envelope helpers (success, successList, error, CommonErrors),
      structured logger (createLogger) emitting standard log shape, and shared
      Zod schemas. Published to npm as common-typescript-utils.
    check_exceptions:
      - rule: CD-002
        reason: shared library — no service entry point for Sentry initialisation
      - rule: TEST-001
        reason: library — normalization tests not applicable
      - rule: TEST-002
        reason: library — deduplication tests not applicable
      - rule: TEST-004
        reason: library — output shape tests not applicable
    added: 2026-04

  # ── Standards & tooling ──────────────────────────────────────

  - id: ecosystem-standards
    type: standards
    status: active
    dod_type: null
    language: yaml
    host: github
    description: >
      Machine-readable ecosystem standards. Single source of truth for
      all architectural decisions, patterns, and conventions. Versioned
      YAML files consumed by evaluator-cog at runtime. Semantic-release
      owns versioning via index.yaml.
    added: 2026-03

  # ── Web applications ──────────────────────────────────────────

  - id: deejaytools-com-api
    type: api
    status: active
    dod_type: new_hono_service
    language: typescript
    framework: hono
    host: railway
    repo: deejaytools-com
    description: >
      Hono on Node API for deejaytools.com. Manages WCS routine registration,
      floor trial sessions, check-ins, slot assignment, partners, and songs.
      PostgreSQL on Railway. Clerk auth. Part of the deejaytools-com monorepo.
    check_exceptions:
      - rule: CD-002
        reason: Hono service — sentry-sdk is Python specific, uses @sentry/node
      - rule: TEST-001
        reason: API service — normalization tests not applicable
      - rule: TEST-002
        reason: API service — deduplication tests not applicable
      - rule: TEST-004
        reason: API service — no pipeline output shape to verify
    added: 2026-03

  - id: deejaytools-com-app
    type: site
    status: active
    dod_type: new_react_app
    language: typescript
    framework: react
    host: cloudflare-pages
    repo: deejaytools-com
    description: >
      React web application for deejaytools.com. WCS routine management
      platform — events, sessions, floor trials, check-in queue, partner
      and song management. Vite + React + Tailwind + shadcn/ui.
      Part of the deejaytools-com monorepo.
    check_exceptions:
      - rule: CD-002
        reason: React app — client-side Sentry via @sentry/react, not sentry-sdk
      - rule: TEST-001
        reason: React app — normalization tests not applicable
      - rule: TEST-002
        reason: React app — deduplication tests not applicable
      - rule: TEST-003
        reason: React app — no pipeline failure path to test
      - rule: TEST-004
        reason: React app — no pipeline output shape to verify
      - rule: DOC-004
        reason: React app — no .env.example, uses Vite env var pattern
    added: 2026-03

  # ── Static sites ──────────────────────────────────────────────

  - id: website-astro-software
    type: site
    status: active
    dod_type: new_frontend_site
    language: astro
    host: cloudflare-pages
    description: >
      Software portfolio site. Queries api-kaianolevine-com live for DJ sets,
      catalog, stats, and evaluation findings.
    check_exceptions:
      - rule: CD-002
        reason: Static site — no server process for Sentry initialisation.
      - rule: TEST-001
        reason: static site — normalization tests not applicable
      - rule: TEST-002
        reason: static site — deduplication tests not applicable
      - rule: TEST-003
        reason: static site — no pipeline failure path to test
      - rule: TEST-004
        reason: static site — no pipeline output shape to verify
      - rule: XSTACK-001
        reason: Static site — no server-side logic, common-typescript-utils not applicable per XSTACK-001 carve-out.
      - rule: XSTACK-003
        reason: >
          Static Astro site on Cloudflare Pages. Repo uses npm (not pnpm)
          and was scaffolded before XSTACK-003 was formalised. npm is
          explicitly permitted for frontend sites per DOC-013.
          Migrating to pnpm is a low-priority backlog item — not a
          blocking violation.
    added: 2026-03

  - id: website-astro-wcs
    type: site
    status: active
    dod_type: new_frontend_site
    language: astro
    host: cloudflare-pages
    description: West Coast Swing personal site. wcs.kaianolevine.com.
    check_exceptions:
      - rule: CD-002
        reason: static site — no server process for Sentry initialisation
      - rule: TEST-001
        reason: static site — normalization tests not applicable
      - rule: TEST-002
        reason: static site — deduplication tests not applicable
      - rule: TEST-003
        reason: static site — no pipeline failure path to test
      - rule: TEST-004
        reason: static site — no pipeline output shape to verify
    replaces: kaiano-wcs-website
    added: 2026-03

  # ── Retired / archived ────────────────────────────────────────

  - id: google-app-script-trigger
    type: infra
    status: retired
    language: javascript
    added: 2026-03
    retired_date: 2026-03
