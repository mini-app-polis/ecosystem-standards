# ecosystem-standards / ecosystem.yaml
# Authoritative inventory of all services, libraries, and canonical patterns
# in the MiniAppPolis ecosystem. Updated whenever a service is added, renamed,
# archived, or changes role.
#
# This file is the single source of truth for service names. Standards rules
# reference concepts documented here rather than hardcoding service names.
# When a rename or retirement happens, update this file first — then the
# standards files will reference it correctly.
#
# Version: 1.2.0 · 2026-04

version: 1.2.0
updated: 2026-04
maintainer: mini-app-polis

services:

  # ── Always-on workers (cogs) ──────────────────────────────────

  - id: watcher-cog
    type: worker
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: trigger
    host: railway
    description: >
      Config-driven Google Drive folder watcher. Polls Drive API on a
      1-minute interval, fires Prefect flow runs when new files are detected.
    check_exceptions:
      - rule: TEST-001
        reason: trigger cog — no data normalization step
      - rule: TEST-002
        reason: trigger cog — no deduplication step
      - rule: TEST-004
        reason: trigger cog — no data output shape to verify
      - rule: CD-009
        reason: >
          src/watcher_cog/logger.py is the logger wrapper implementation for
          this service — it must use stdlib logging internally. CD-009 does
          not apply to logger implementation files.
    replaces: google-app-script-trigger
    added: 2026-03

  - id: deejay-cog
    type: worker
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: pipeline
    host: railway
    description: >
      DJ set CSV processor. Normalizes, validates, and ingests DJ set data
      into PostgreSQL via api-kaianolevine-com.
    replaces: deejay-set-processor-dev
    added: 2026-03

  - id: evaluator-cog
    type: worker
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: pipeline
    host: railway
    description: >
      Multi-mode AI evaluation cog. Runs post-pipeline behavioral evaluation
      (pipeline_eval flow) and daily structural conformance checking against
      ecosystem standards (conformance flow). Fetches live ecosystem inventory
      and standards rules at runtime. All findings written to
      pipeline_evaluations table via api-kaianolevine-com with source field
      distinguishing evaluation type.
    check_exceptions:
      - rule: TEST-001
        reason: evaluation cog — no normalization of external data
      - rule: TEST-002
        reason: evaluation cog — no deduplication of external data
      - rule: TEST-004
        reason: evaluation cog — output shape tested via LLM parsing tests
      - rule: CD-009
        reason: >
          src/evaluator_cog/engine/deterministic.py uses stdlib logging
          intentionally — it is a pure logic module loaded during unit tests
          where the shared logger is unavailable. CD-009 does not apply to
          test-safe utility modules.
      - rule: PIPE-008
        reason: >
          The deterministic checker source contains retired trigger pattern
          strings (e.g. repository_dispatch) as string literals being checked
          against, not as active trigger usage. PIPE-008 does not apply.
      - rule: CD-015
        reason: >
          evaluator-cog runs two distinct flows (conformance_check_flow and
          pipeline_eval). The conformance flow is registered via its own
          Prefect entry point and scheduled independently. prefect.serve()
          pattern is present — the checker cannot always resolve it from the
          source scan due to the multi-flow structure.
    added: 2026-03


  - id: notes-ingest-cog
    type: worker
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: pipeline
    host: railway
    description: >
      WCS lesson transcript ingestion pipeline. Triggered by watcher-cog when
      new transcript files land in the configured Google Drive input folder.
      Reads transcripts, calls LLM to produce structured notes JSON, stores
      raw transcripts and notes in Postgres via api-kaianolevine-com, and
      archives processed files. Outputs to wcs_transcripts and wcs_notes
      tables. Consumed by wcs.kaianolevine.com.
    check_exceptions:
      - rule: TEST-001
        reason: pipeline cog — no normalization of raw transcript data
      - rule: TEST-002
        reason: pipeline cog — no deduplication of transcript data
      - rule: TEST-004
        reason: pipeline cog — output shape tested via LLM parsing tests
    added: 2026-04

  # ── API services ──────────────────────────────────────────────

  - id: api-kaianolevine-com
    type: api
    status: active
    dod_type: new_fastapi_service
