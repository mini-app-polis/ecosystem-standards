# ecosystem-standards / ecosystem.yaml
# Authoritative inventory of all services, libraries, and canonical patterns
# in the MiniAppPolis ecosystem. Updated whenever a service is added, renamed,
# archived, or changes role.
#
# This file is the single source of truth for service names. Standards rules
# reference concepts documented here rather than hardcoding service names.
# When a rename or retirement happens, update this file first — then the
# standards files will reference it correctly.
#

services:

  # ── Always-on workers (cogs) ──────────────────────────────────

  - id: watcher-cog
    type: trigger-cog
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: trigger
    host: railway
    description: >
      Config-driven Google Drive folder watcher. Polls Drive API on a
      1-minute interval, fires Prefect flow runs when new files are detected.
    replaces: google-app-script-trigger

  - id: deejay-cog
    type: pipeline-cog
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: pipeline
    host: railway
    description: >
      DJ set CSV processor. Normalizes, validates, and ingests DJ set data
      into PostgreSQL via api-kaianolevine-com.
    replaces: deejay-set-processor-dev

  - id: evaluator-cog
    type: pipeline-cog
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: pipeline
    host: railway
    description: >
      Multi-mode AI evaluation cog. Runs post-pipeline behavioral evaluation
      (pipeline_eval flow) and daily structural conformance checking against
      ecosystem standards (conformance flow). Fetches live ecosystem inventory
      and standards rules at runtime. All findings written to
      pipeline_evaluations table via api-kaianolevine-com with source field
      distinguishing evaluation type.

  - id: notes-ingest-cog
    type: pipeline-cog
    status: active
    dod_type: new_cog
    language: python
    cog_subtype: pipeline
    host: railway
    description: >
      WCS lesson transcript ingestion pipeline. Triggered by watcher-cog when
      new transcript files land in the configured Google Drive input folder.
      Reads transcripts, calls LLM to produce structured notes JSON, stores
      raw transcripts and notes in Postgres via api-kaianolevine-com, and
      archives processed files. Outputs to wcs_transcripts and wcs_notes
      tables. Consumed by wcs.kaianolevine.com.

  # ── API services ──────────────────────────────────────────────

  - id: api-kaianolevine-com
    type: api-service
    status: active
    dod_type: new_fastapi_service
    language: python
    framework: fastapi
    host: railway
    description: >
      Primary ecosystem API. DJ sets, tracks, catalog, evaluations, feature
      flags, contact form, resume endpoints. Sole API for the kaianolevine.com
      ecosystem.
    replaces: deejay-marvel-api

  # ── Shared libraries ──────────────────────────────────────────

  - id: common-python-utils
    type: shared-library
    status: active
    dod_type: null
    language: python
    description: >
      Shared Python utilities. Google API client (Drive, Sheets), LLM client
      (Anthropic, OpenAI), structured logging, API client, metadata helpers.
      All Python processors and cogs declare this as a dependency.
    replaces: kaiano-common-utils

  - id: kaiano-ts-utils
    type: shared-library
    status: retired
    language: typescript
    retired_date: 2026-04
    replaced_by: common-typescript-utils
    description: >
      Former shared TypeScript utilities library. Lived in packages/ts-utils
      inside the deejaytools-com monorepo. Extracted and renamed to
      common-typescript-utils in April 2026.

  - id: common-typescript-utils
    type: shared-library
    status: active
    dod_type: null
    language: typescript
    repo: common-typescript-utils
    description: >
      Shared TypeScript utilities. Clerk auth middleware (verifyClerkToken),
      response envelope helpers (success, successList, error, CommonErrors),
      structured logger (createLogger) emitting standard log shape, and shared
      Zod schemas. Published to npm as common-typescript-utils.

  # ── Standards & tooling ──────────────────────────────────────

  - id: ecosystem-standards
    type: standards-repo
    status: active
    dod_type: null
    language: yaml
    host: github
    description: >
      Machine-readable ecosystem standards. Single source of truth for
      all architectural decisions, patterns, and conventions. Versioned
      YAML files consumed by evaluator-cog at runtime. Semantic-release
      owns versioning via index.yaml.

  # ── Web applications ──────────────────────────────────────────

  - id: deejaytools-com-api
    type: api-service
    status: active
    dod_type: new_hono_service
    language: typescript
    framework: hono
    host: railway
    repo: deejaytools-com
    monorepo: deejaytools-com
    monorepo_path: apps/api
    description: >
      Hono on Node API for deejaytools.com. Manages WCS routine registration,
      floor trial sessions, check-ins, slot assignment, partners, and songs.
      PostgreSQL on Railway. Clerk auth. Part of the deejaytools-com monorepo.

  - id: deejaytools-com-app
    type: react-app
    status: active
    dod_type: new_react_app
    language: typescript
    framework: react
    host: cloudflare-pages
    repo: deejaytools-com
    monorepo: deejaytools-com
    monorepo_path: apps/app
    description: >
      React web application for deejaytools.com. WCS routine management
      platform — events, sessions, floor trials, check-in queue, partner
      and song management. Vite + React + Tailwind + shadcn/ui.
      Part of the deejaytools-com monorepo.

  # ── Static sites ──────────────────────────────────────────────

  - id: website-astro-software
    type: static-site
    status: active
    dod_type: new_frontend_site
    language: astro
    host: cloudflare-pages
    description: >
      Software portfolio site. Queries api-kaianolevine-com live for DJ sets,
      catalog, stats, and evaluation findings. Hosts the feature flag
      admin panel at /admin (Clerk-authenticated, admin role required) —
      the canonical management surface for toggling flags across the
      ecosystem.

  - id: website-astro-wcs
    type: static-site
    status: active
    dod_type: new_frontend_site
    language: astro
    host: cloudflare-pages
    description: West Coast Swing personal site. wcs.kaianolevine.com.
    replaces: kaiano-wcs-website

  # ── Retired / archived ────────────────────────────────────────

  - id: google-app-script-trigger
    type: infra
    status: retired
    language: javascript
    retired_date: 2026-03
    replaced_by: watcher-cog
    description: >
      Apps Script + GitHub Actions bridge for Drive-triggered workflows.
      Replaced by watcher-cog which polls Drive directly and fires Prefect
      flow runs without an intermediate GitHub Actions step.

  - id: kaiano-common-utils
    type: library
    status: retired
    language: python
    retired_date: 2026-03
    replaced_by: common-python-utils
    description: Former shared Python utilities library.

  - id: deejay-set-processor-dev
    type: worker
    status: retired
    language: python
    retired_date: 2026-03
    replaced_by: deejay-cog
    description: Former DJ set CSV processor. Replaced by deejay-cog.

  - id: deejay-marvel-api
    type: api
    status: retired
    language: python
    retired_date: 2026-03
    replaced_by: api-kaianolevine-com
    description: >
      Former DJ data API. Fully merged into api-kaianolevine-com.

  - id: kaiano-wcs-website
    type: site
    status: retired
    language: astro
    retired_date: 2026-03
    replaced_by: website-astro-wcs
    description: Former WCS personal site. Replaced by website-astro-wcs.


# ── Monorepos ─────────────────────────────────────────────────
#
# Monorepos are repos that contain multiple evaluatable services under a
# single git repository. The evaluator-cog uses this section to:
#
#   1. Clone the full repo once and evaluate each app at its monorepo_path.
#   2. Pass workspace-level context to Claude when evaluating each app
#      (workspace deps, package manager, sibling apps) so rules like
#      XSTACK-001 are checked at the workspace root, not per-app.
#   3. Deduplicate findings that share the same root cause across sibling
#      apps — emitting one finding tagged with both apps rather than
#      two identical findings.
#
# Rule: any service entry with a `monorepo` field must have a corresponding
# entry here. The `apps` list here is the authoritative membership list;
# the `monorepo` + `monorepo_path` fields on service entries are the
# per-service pointers back to this record.

monorepos:

  - id: deejaytools-com
    repo: deejaytools-com
    package_manager: pnpm
    workspace_config: pnpm-workspace.yaml
    description: >
      pnpm monorepo containing the deejaytools.com API and web application.
      Workspace-level deps satisfy per-app shared library requirements
      (XSTACK-001, XSTACK-003). CI is evaluated at the repo root.
    apps:
      - service_id: deejaytools-com-api
        path: apps/api
      - service_id: deejaytools-com-app
        path: apps/app
    workspace_deps: []
      # common-typescript-utils is declared per-app, not at the workspace root.
      # XSTACK-001 is therefore assessed against each app's own package.json.
    evaluator:
      strategy: per_app
      # Evaluate each app independently for findings granularity, but pass
      # the full monorepo context block to Claude with every app eval.
      workspace_context: true
      # If two sibling apps produce a finding with the same rule_id and the
      # same root cause, emit one finding tagged with both service_ids rather
      # than two identical findings.
      deduplicate_sibling_findings: true

# ── Canonical patterns ────────────────────────────────────────

patterns:

  drive_trigger:
    description: How Drive file drops trigger processor flows
    current: watcher-cog polls Drive API → fires Prefect create_flow_run
    retired: Apps Script → repository_dispatch → GitHub Actions
    changed: 2026-03

  orchestration:
    description: How pipelines are scheduled and executed
    current: Prefect Cloud deployments — watcher-cog fires triggers, Prefect executes flows
    retired: GitHub Actions as orchestrator
    changed: 2026-03

  python_shared_library:
    description: Shared Python utility library name
    current: common-python-utils
    retired: kaiano-common-utils
    changed: 2026-03

  typescript_shared_library:
    description: Shared TypeScript utility library name
    current: common-typescript-utils
    retired: kaiano-ts-utils
    changed: 2026-04

  api_services:
    description: Active API services
    current: api-kaianolevine-com (sole API for kaianolevine.com ecosystem)
    retired: deejay-marvel-api (merged into api-kaianolevine-com)
    changed: 2026-03

terminology:

  cog:
    definition: >
      An always-on Python worker service deployed on Railway. Runs a
      continuous loop or event-driven task. No HTTP server, no port binding.
      The canonical service type for all automation, processing, and
      evaluation work in the ecosystem.
    examples:
      - watcher-cog — Drive folder watcher, fires Prefect flow runs
      - deejay-cog — DJ set CSV processor and ingestion
      - evaluator-cog — post-pipeline AI evaluation
    subtypes:
      pipeline_cog: >
        Runs a Prefect @flow to process data. Examples: deejay-cog,
        evaluator-cog.
      trigger_cog: >
        Detects events and fires Prefect flow runs via API. No @flow
        decorator. Examples: watcher-cog.
    replaces: processor
    note: >
      "Processor" was the original term for this service type. It is retired.
      All new services of this type are named {purpose}-cog and use the
      new_cog DoD checklist.

  pipeline:
    definition: >
      The Prefect flow and task logic inside a cog. A cog runs a pipeline.
      The terms are related but distinct — the cog is the service,
      the pipeline is the execution logic within it.

  trigger:
    definition: >
      The mechanism that causes a Prefect flow run to be created.
      Triggers are fired by watcher-cog (Drive events), Prefect schedules
      (time-based), or the Prefect UI/API (manual). GitHub Actions is
      not a trigger mechanism.
